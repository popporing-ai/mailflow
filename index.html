const OneDriveSvc = {
  _instance: null,
  _account:  null,
  FOLDER:    'MailFlow',
  FILES: { contacts:'contacts.json', campaigns:'campaigns.json',
           templates:'templates.json', automations:'automations.json' },

  init(clientId) {
    if (!clientId || !window.msal) return false;
    try {
      this._instance = new window.msal.PublicClientApplication({
        auth: {
          clientId,
          authority: 'https://login.microsoftonline.com/common',
          redirectUri: window.location.href.split('?')[0].split('#')[0],
        },
        cache: { cacheLocation:'localStorage', storeAuthStateInCookie:false },
      });
      const accs = this._instance.getAllAccounts();
      if (accs.length > 0) this._account = accs[0];
      return true;
    } catch(e) { console.error('MSAL init 실패:', e); return false; }
  },

  async login() {
    if (!this._instance) throw new Error('MSAL이 초기화되지 않았습니다. Client ID를 먼저 입력하세요.');
    const res = await this._instance.loginPopup({ scopes:['Files.ReadWrite','User.Read'] });
    this._account = res.account;
    return res.account;
  },

  logout() {
    if (this._instance && this._account) this._instance.logoutPopup({ account:this._account }).catch(()=>{});
    this._instance = null; this._account = null;
  },

  async _getToken() {
    if (!this._instance || !this._account) throw new Error('OneDrive 로그인이 필요합니다.');
    try {
      const r = await this._instance.acquireTokenSilent({ scopes:['Files.ReadWrite'], account:this._account });
      return r.accessToken;
    } catch {
      const r = await this._instance.acquireTokenPopup({ scopes:['Files.ReadWrite'] });
      return r.accessToken;
    }
  },

  async _ensureFolder() {
    const token = await this._getToken();
    const check = await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${this.FOLDER}`,
      { headers:{ Authorization:`Bearer ${token}` } });
    if (check.status === 404) {
      await fetch('https://graph.microsoft.com/v1.0/me/drive/root/children', {
        method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ name:this.FOLDER, folder:{}, '@microsoft.graph.conflictBehavior':'rename' })
      });
    }
  },

  async readFile(filename) {
    try {
      const token = await this._getToken();
      const res = await fetch(
        `https://graph.microsoft.com/v1.0/me/drive/root:/${this.FOLDER}/${filename}:/content`,
        { headers:{ Authorization:`Bearer ${token}` } }
      );
      if (res.status === 404) return null;
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  },

  async writeFile(filename, data) {
    const token = await this._getToken();
    const res = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/root:/${this.FOLDER}/${filename}:/content`,
      { method:'PUT', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
        body: JSON.stringify(data) }
    );
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`쓰기 실패: ${res.status}`); }
    return true;
  },

  async syncAll(stateData) {
    await this._ensureFolder();
    await Promise.all([
      this.writeFile(this.FILES.contacts,    stateData.contacts   ||[]),
      this.writeFile(this.FILES.campaigns,   stateData.campaigns  ||[]),
      this.writeFile(this.FILES.templates,   stateData.templates  ||[]),
      this.writeFile(this.FILES.automations, stateData.automations||[]),
    ]);
    return new Date().toISOString();
  },

  async loadAll() {
    await this._ensureFolder();
    const [contacts, campaigns, templates, automations] = await Promise.all([
      this.readFile(this.FILES.contacts),
      this.readFile(this.FILES.campaigns),
      this.readFile(this.FILES.templates),
      this.readFile(this.FILES.automations),
    ]);
    return { contacts, campaigns, templates, automations };
  },

  getAccountName() { return this._account?.name || this._account?.username || null; },
  isLoggedIn()     { return !!this._account; },
};

// localStorage helpers
const store = {
  get: (key, fallback) => { try { const v=localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} },
};

function initSeedData() {
  if (!store.get(SK.contacts, null)) store.set(SK.contacts, SEED_CONTACTS);
  if (!store.get(SK.campaigns, null)) store.set(SK.campaigns, SEED_CAMPAIGNS);
  if (!store.get(SK.templates, null)) store.set(SK.templates, SEED_TEMPLATES);
  if (!store.get(SK.events, null)) store.set(SK.events, []);
  if (!store.get(SK.automations, null)) store.set(SK.automations, []);
  if (!store.get(SK.settings, null)) store.set(SK.settings, DEFAULT_SETTINGS);
}

/* =========================================================
   3. GLOBAL CONTEXT
   ========================================================= */
const AppCtx = createContext(null);

function appReducer(state, action) {
  switch(action.type) {
    case 'SET_PAGE': return {...state, page: action.page};
    case 'SET_CONTACTS': store.set(SK.contacts, action.data); return {...state, contacts: action.data};
    case 'SET_CAMPAIGNS': store.set(SK.campaigns, action.data); return {...state, campaigns: action.data};
    case 'SET_TEMPLATES': store.set(SK.templates, action.data); return {...state, templates: action.data};
    case 'SET_AUTOMATIONS': store.set(SK.automations, action.data); return {...state, automations: action.data};
    case 'SET_SETTINGS': store.set(SK.settings, action.data); return {...state, settings: action.data};
    case 'ADD_TOAST': return {...state, toasts: [...state.toasts, {id:Date.now(), ...action.toast}]};
    case 'REMOVE_TOAST': return {...state, toasts: state.toasts.filter(t=>t.id!==action.id)};
    case 'TOGGLE_SIDEBAR': return {...state, sidebarCollapsed: !state.sidebarCollapsed};
    default: return state;
  }
}

function AppProvider({ children }) {
  initSeedData();
  const [state, dispatch] = useReducer(appReducer, {
    page: window.location.hash.slice(1) || 'dashboard',
    contacts:    store.get(SK.contacts, SEED_CONTACTS),
    campaigns:   store.get(SK.campaigns, SEED_CAMPAIGNS),
    templates:   store.get(SK.templates, SEED_TEMPLATES),
    events:      store.get(SK.events, []),
    automations: store.get(SK.automations, []),
    settings:    store.get(SK.settings, DEFAULT_SETTINGS),
    toasts: [],
    sidebarCollapsed: false,
  });

  useEffect(() => { window.location.hash = state.page; }, [state.page]);
  useEffect(() => {
    const onHash = () => dispatch({type:'SET_PAGE', page: window.location.hash.slice(1)||'dashboard'});
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const navigate = useCallback((page) => dispatch({type:'SET_PAGE', page}), []);
  const toast = useCallback((msg, type='success') => {
    const id = Date.now();
    dispatch({type:'ADD_TOAST', toast:{msg, type, id}});
    setTimeout(() => dispatch({type:'REMOVE_TOAST', id}), 3500);
  }, []);

  return (
    <AppCtx.Provider value={{state, dispatch, navigate, toast}}>
      {children}
    </AppCtx.Provider>
  );
}

const useApp = () => useContext(AppCtx);

    bot:         <svg style={s} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
  };
  return paths[name] || null;
}

// --- Button ---
function Btn({ children, variant='primary', size='md', icon, onClick, disabled, style:xs, type='button' }) {
  const base = {
    display:'inline-flex', alignItems:'center', gap:6, border:'none',
    cursor: disabled ? 'not-allowed' : 'pointer',
    fontWeight:600, borderRadius:R.md, transition:'all 0.18s',
    fontSize: size==='sm' ? 12 : size==='lg' ? 15 : 13,
    padding: size==='sm' ? '6px 12px' : size==='lg' ? '12px 24px' : '8px 18px',
    opacity: disabled ? 0.5 : 1,
  };
  const variants = {
    primary:   {background:C.accent, color:'#fff'},
    secondary: {background:C.surfaceHov, color:C.text, border:`1px solid ${C.border}`},
    ghost:     {background:'transparent', color:C.textSec},
    danger:    {background:'rgba(225,112,85,0.15)', color:C.danger, border:`1px solid rgba(225,112,85,0.3)`},
    success:   {background:'rgba(0,184,148,0.15)', color:C.success, border:`1px solid rgba(0,184,148,0.3)`},
  };
  return (
    <button type={type} style={{...base,...variants[variant],...xs}} onClick={onClick} disabled={disabled}>
      {icon && <Icon name={icon} size={size==='sm'?13:15}/>}
      {children}
    </button>
  );
}

// --- Badge ---
const BADGE_COLORS = {
  green:  {bg:'rgba(0,184,148,0.15)',  text:C.success},
  blue:   {bg:'rgba(108,92,231,0.15)', text:C.accentL},
  yellow: {bg:'rgba(253,203,110,0.15)',text:C.warning},
  red:    {bg:'rgba(225,112,85,0.15)', text:C.danger},
  gray:   {bg:'rgba(88,146,168,0.12)', text:C.textSec},
  purple: {bg:'rgba(162,155,254,0.15)',text:'#C8C4FF'},
};
function Badge({ text, color='gray', style:xs }) {
  const c = BADGE_COLORS[color] || BADGE_COLORS.gray;
  return (
    <span style={{
      padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600,
      background:c.bg, color:c.text, display:'inline-block', whiteSpace:'nowrap', ...xs
    }}>{text}</span>
  );
}

// --- Input ---
function Input({ label, value, onChange, placeholder, type='text', style:xs, inputStyle, note }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6,...xs}}>
      {label && <label style={{fontSize:13,color:C.textSec,fontWeight:500}}>{label}</label>}
      <input
        type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{
          padding:'10px 14px', borderRadius:R.md, border:`1px solid ${C.border}`,
          background:C.bg, color:C.text, fontSize:13, outline:'none',
          transition:'border-color 0.18s', ...inputStyle
        }}
        onFocus={e=>e.target.style.borderColor=C.accent}
        onBlur={e=>e.target.style.borderColor=C.border}
      />
      {note && <span style={{fontSize:12,color:C.textMut}}>{note}</span>}
    </div>
  );
}

// --- Select ---
function Select({ label, value, onChange, options, style:xs }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6,...xs}}>
      {label && <label style={{fontSize:13,color:C.textSec,fontWeight:500}}>{label}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{padding:'10px 14px',borderRadius:R.md,border:`1px solid ${C.border}`,
          background:C.bg,color:C.text,fontSize:13,outline:'none',cursor:'pointer'}}>
        {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}

// --- Card ---
function Card({ children, style:xs, title, action }) {
  return (
    <div style={{background:C.card,borderRadius:R.xl,border:`1px solid ${C.border}`,padding:24,...xs}}>
      {title && (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,color:C.text,margin:0}}>{title}</h3>
          {action}
        </div>
      )}
      {children}
    </div>
  );
}

// --- Modal ---
function Modal({ open, onClose, title, children, width=520 }) {
  if (!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)'}}/>
      <div style={{
        position:'relative',zIndex:1,background:C.surface,borderRadius:R['2xl'],
        border:`1px solid ${C.border}`,padding:28,width:'90%',maxWidth:width,
        maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 64px rgba(0,0,0,0.5)'
      }}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
          <h2 style={{fontSize:18,fontWeight:700,color:C.text,margin:0}}>{title}</h2>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textMut,padding:4}}>
            <Icon name="x" size={20}/>
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

// --- Toast ---
function ToastContainer() {
  const {state, dispatch} = useApp();
  const icons = {success:'check', error:'x', warning:'warning', info:'info'};
  const colors = {success:C.success, error:C.danger, warning:C.warning, info:C.accentL};
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:2000,display:'flex',flexDirection:'column',gap:8}}>
      {state.toasts.map(t => (
        <div key={t.id} style={{
          display:'flex',alignItems:'center',gap:12,padding:'12px 18px',
          borderRadius:R.lg,background:C.surface,border:`1px solid ${C.border}`,
          boxShadow:'0 8px 32px rgba(0,0,0,0.4)',minWidth:280,maxWidth:360,
          animation:'slideIn 0.2s ease',color:C.text,fontSize:13,fontWeight:500
        }}>
          <span style={{color:colors[t.type]||colors.success,flexShrink:0}}>
            <Icon name={icons[t.type]||'check'} size={16}/>
          </span>
          <span style={{flex:1}}>{t.msg}</span>
          <button onClick={()=>dispatch({type:'REMOVE_TOAST',id:t.id})}
            style={{background:'none',border:'none',cursor:'pointer',color:C.textMut,flexShrink:0,padding:0}}>
            <Icon name="x" size={14}/>
          </button>
        </div>
      ))}
    </div>
  );
}

// --- Stat Card ---
function StatCard({ label, value, sub, trend, color }) {
  return (
    <div style={{
      background:C.card, borderRadius:R.xl, padding:'22px 26px',
      border:`1px solid ${C.border}`, position:'relative', overflow:'hidden', flex:'1 1 0', minWidth:160
    }}>
      <div style={{position:'absolute',top:0,right:0,width:90,height:90,
        background:`radial-gradient(circle at top right,${color}18,transparent)`}}/>
      <div style={{fontSize:13,color:C.textSec,marginBottom:8}}>{label}</div>
      <div style={{fontSize:30,fontWeight:800,color:C.text,letterSpacing:'-1px'}}>{value}</div>
      <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8}}>
        {trend !== undefined && (
          <span style={{fontSize:12,fontWeight:600,color:trend>0?C.success:C.danger,
            display:'flex',alignItems:'center',gap:2}}>
            <Icon name={trend>0?'arrowUp':'arrowDown'} size={11}/>
            {Math.abs(trend)}%
          </span>
        )}
        {sub && <span style={{fontSize:12,color:C.textMut}}>{sub}</span>}
      </div>
    </div>
  );
}

// --- Mini Bar Chart ---
function MiniBarChart({ data, color, height=100 }) {
  const max = Math.max(...data.map(d=>d.value), 1);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:3,height,padding:'0 2px'}}>
      {data.map((d,i) => (
        <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
          <div style={{
            width:'100%', borderRadius:'3px 3px 0 0',
            height:`${(d.value/max)*(height-20)}px`, minHeight:3,
            background:`linear-gradient(180deg,${color},${color}88)`,
          }}/>
          {d.label && <span style={{fontSize:10,color:C.textMut,marginTop:3}}>{d.label}</span>}
        </div>
      ))}
    </div>
  );
}

// --- Page Shell (for unbuilt pages) ---
function PageShell({ icon, title, stage, desc, items=[] }) {
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      minHeight:'60vh',gap:24,textAlign:'center'}}>
      <div style={{
        width:72,height:72,borderRadius:20,
        background:`linear-gradient(135deg,${C.accent}20,${C.accentL}10)`,
        border:`1px solid ${C.accent}30`,
        display:'flex',alignItems:'center',justifyContent:'center',color:C.accentL
      }}>
        <Icon name={icon} size={32}/>
      </div>
      <div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:8}}>
          <h1 style={{fontSize:26,fontWeight:800,color:C.text}}>{title}</h1>
          <Badge text={`${stage}단계 개발 예정`} color="blue"/>
        </div>
        <p style={{color:C.textSec,fontSize:14,maxWidth:400,margin:'0 auto'}}>{desc}</p>
      </div>
      {items.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',maxWidth:480}}>
          {items.map((item,i) => (
            <span key={i} style={{
              padding:'6px 14px',borderRadius:R.md,fontSize:13,
              background:C.surfaceHov,color:C.textSec,border:`1px solid ${C.border}`
            }}>· {item}</span>
          ))}
        </div>
      )}
    </div>

}

/* =========================================================
   5. SIDEBAR & LAYOUT
   ========================================================= */
const NAV_ITEMS = [
  {id:'dashboard',  label:'대시보드',   icon:'dashboard'},
  {id:'contacts',   label:'수신자 관리', icon:'contacts'},
  {id:'campaigns',  label:'캠페인',     icon:'campaigns'},
  {id:'templates',  label:'템플릿',     icon:'templates'},
  {id:'automation', label:'자동화',     icon:'automation'},
  {id:'analytics',  label:'성과 분석',  icon:'analytics'},
];

function Sidebar() {
  const {state, navigate, dispatch} = useApp();
  const col = state.sidebarCollapsed;
  const settings = state.settings;
  const hasBrevo = !!settings.brevoApiKey;
  const hasGemini = !!settings.geminiApiKey;

  return (
    <div style={{
      width: col ? 64 : 220, flexShrink:0, transition:'width 0.25s ease',
      background:C.surface, borderRight:`1px solid ${C.border}`,
      display:'flex', flexDirection:'column', overflow:'hidden'
    }}>
      {/* Logo */}
      <div style={{
        padding: col ? '18px 12px' : '18px 18px',
        borderBottom:`1px solid ${C.border}`,
        display:'flex', alignItems:'center', gap:10, cursor:'pointer'
      }} onClick={()=>dispatch({type:'TOGGLE_SIDEBAR'})}>
        <div style={{
          width:34,height:34,borderRadius:10,flexShrink:0,
          background:`linear-gradient(135deg,${C.accent},${C.accentL})`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:17
        }}>✉</div>
        {!col && (
          <div style={{overflow:'hidden'}}>
            <div style={{fontSize:14,fontWeight:800,color:C.text,whiteSpace:'nowrap'}}>MailFlow</div>
            <div style={{fontSize:11,color:C.textMut,whiteSpace:'nowrap'}}>이메일 마케팅</div>
          </div>
        )}
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:'10px 6px',overflowY:'auto'}}>
        {NAV_ITEMS.map(item => {
          const active = state.page === item.id;
          return (
            <button key={item.id} onClick={()=>navigate(item.id)} style={{
              display:'flex', alignItems:'center', gap:10, width:'100%',
              padding: col ? '11px' : '11px 12px',
              borderRadius:R.md, border:'none', cursor:'pointer',
              background: active ? C.accentGlow : 'transparent',
              color: active ? C.accentL : C.textSec,
              fontSize:13, fontWeight: active ? 700 : 400,
              transition:'all 0.18s', marginBottom:2,
              justifyContent: col ? 'center' : 'flex-start',
            }}>
              <Icon name={item.icon} size={18}/>
              {!col && <span>{item.label}</span>}
            </button>
          );
        })}
      </nav>

      {/* API Status */}
      {!col && (
        <div style={{padding:'12px 10px', borderTop:`1px solid ${C.border}`}}>
          <button onClick={()=>navigate('settings')} style={{
            width:'100%', padding:'12px 14px', borderRadius:R.lg,
            background: state.page==='settings' ? C.accentGlow : `linear-gradient(135deg,${C.accent}12,${C.accentL}08)`,
            border:`1px solid ${C.accent}25`, cursor:'pointer', textAlign:'left'
          }}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <Icon name="settings" size={14} style={{color:C.accentL}}/>
              <span style={{fontSize:12,fontWeight:700,color:C.accentL}}>API 설정</span>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[
                [hasBrevo,  'Brevo'],
                [hasGemini, 'Gemini'],
                [OneDriveSvc.isLoggedIn(), '☁ Drive'],
              ].map(([ok, label])=>(
                <span key={label} style={{fontSize:11,padding:'2px 7px',borderRadius:10,fontWeight:600,
                  background:ok?'rgba(0,184,148,0.15)':'rgba(225,112,85,0.15)',
                  color:ok?C.success:C.danger}}>
                  {ok?'✓':'✗'} {label}
                </span>
              ))}
            </div>
          </button>
        </div>
      )}
    </div>
  );
}

function TopHeader() {
  const { state, navigate, toast } = useApp();
  const page     = NAV_ITEMS.find(n=>n.id===state.page);
  const title    = page?.label || '설정';
  const settings = state.settings || {};
  const [now, setNow]       = useState(new Date());
  const [syncing, setSyncing] = useState(false);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(t);
  }, []);

  const handleQuickSync = async () => {
    if (!OneDriveSvc.isLoggedIn()) { toast('OneDrive에 먼저 연결해주세요 (설정)', 'error'); return; }
    setSyncing(true);
    try {
      await OneDriveSvc.syncAll({ contacts:state.contacts, campaigns:state.campaigns,
        templates:state.templates, automations:state.automations });
      toast('☁️ OneDrive 동기화 완료!');
    } catch(e) { toast('동기화 실패: '+e.message, 'error'); }
    finally { setSyncing(false); }
  };

  const missingApis = [
    !settings.brevoApiKey  && 'Brevo',
    !settings.geminiApiKey && 'Gemini',
  ].filter(Boolean);

  return (
    <div style={{height:52,flexShrink:0,background:C.surface,borderBottom:`1px solid ${C.border}`,
      display:'flex',alignItems:'center',padding:'0 22px',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
        {page && <Icon name={page.icon} size={15} color={C.accentL}/>}
        <span style={{fontSize:14,fontWeight:700,color:C.text,whiteSpace:'nowrap'}}>{title}</span>
        {missingApis.length>0 && (
          <button onClick={()=>navigate('settings')}
            style={{marginLeft:4,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:600,
              background:`${C.warning}22`,color:C.warning,border:`1px solid ${C.warning}44`,cursor:'pointer'}}>
            ⚠ {missingApis.join(', ')} 미설정
          </button>
        )}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span style={{fontSize:11,color:C.textSec}}>
          {now.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'})}
        </span>
        {OneDriveSvc.isLoggedIn() && (
          <button onClick={handleQuickSync} disabled={syncing}
            style={{padding:'4px 11px',borderRadius:6,border:`1px solid ${C.accent}44`,
              background:`${C.accent}11`,color:C.accent,cursor:'pointer',fontSize:11,fontWeight:600}}>
            {syncing ? '⟳ ...' : '☁️ 동기화'}
          </button>
        )}
        <button onClick={()=>navigate('settings')}
          style={{width:28,height:28,borderRadius:7,border:`1px solid ${C.border}`,
            background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="settings" size={14} color={C.textSec}/>
        </button>
      </div>
    </div>
  );
}

function Layout({ children }) {
  return (
    <div style={{display:'flex',height:'100vh',background:C.bg}}>
      <Sidebar/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopHeader/>
        <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}}>
          <div style={{maxWidth:1200,margin:'0 auto',padding:'22px 26px'}}>
            {children}
          </div>
        </div>
      </div>
      <ToastContainer/>
    </div>
  );
}

   6. DASHBOARD PAGE

const WEEKLY_MOCK = [
  {label:'월',sent:320,opened:142,clicked:38},
  {label:'화',sent:280,opened:118,clicked:31},
  {label:'수',sent:450,opened:205,clicked:62},

  {label:'금',sent:520,opened:248,clicked:78},

];

/* ── 온보딩 모달 (첫 방문) ── */
function OnboardingModal() {
  const { navigate } = useApp();
  const [open, setOpen] = useState(() => !localStorage.getItem('mf_onboarded'));
  const [step, setStep]  = useState(0);
  const steps = [
    { icon:'✉️', title:'MailFlow에 오신 것을 환영합니다!',
      desc:'Brevo로 이메일을 발송하고, Gemini AI로 콘텐츠를 생성하며, OneDrive에 데이터를 백업할 수 있는 이메일 마케팅 자동화 툴입니다.' },
    { icon:'⚙️', title:'1단계: API 키 설정',
      desc:'설정 페이지에서 Brevo API 키 + 발신자 이메일, Gemini API 키를 입력하세요. 두 서비스 모두 무료 플랜이 제공됩니다.' },
    { icon:'👥', title:'2단계: 수신자 추가',
      desc:'수신자 관리에서 CSV로 연락처를 일괄 임포트하거나 직접 추가할 수 있습니다. 태그로 세그먼트를 만들어보세요.' },
    { icon:'📧', title:'3단계: 템플릿 작성',
      desc:'Gemini AI가 캠페인 유형과 톤에 맞는 이메일 초안을 자동 생성합니다. 미리보기 후 수정 저장하세요.' },
    { icon:'🚀', title:'4단계: 캠페인 발송',
      desc:'캠페인에서 템플릿과 수신자를 선택하고 Brevo API로 즉시 발송하거나 예약 발송을 설정하세요.' },
  ];
  const cur = steps[step];
  if (!open) return null;
  const finish = () => { localStorage.setItem('mf_onboarded','1'); setOpen(false); navigate('settings'); };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.72)',zIndex:9999,
      display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:C.surface,borderRadius:20,padding:'36px 40px',maxWidth:480,width:'90%',
        border:`1px solid ${C.border}`,boxShadow:'0 24px 80px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:28}}>
          {steps.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{width:i===step?24:8,height:8,borderRadius:99,
              background:i===step?C.accent:C.border,cursor:'pointer',transition:'all 0.2s'}}/>
          ))}
        </div>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:14}}>{cur.icon}</div>
          <h2 style={{fontSize:20,fontWeight:800,color:C.text,margin:'0 0 10px'}}>{cur.title}</h2>
          <p style={{fontSize:14,color:C.textSec,lineHeight:1.8,margin:0}}>{cur.desc}</p>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center',alignItems:'center'}}>
          {step>0 && <Btn variant="secondary" onClick={()=>setStep(s=>s-1)}>← 이전</Btn>}
          {step<steps.length-1
            ? <Btn variant="primary" onClick={()=>setStep(s=>s+1)}>다음 →</Btn>
            : <Btn variant="primary" icon="settings" onClick={finish}>설정 시작하기</Btn>}
          <button onClick={()=>{localStorage.setItem('mf_onboarded','1');setOpen(false);}}
            style={{background:'transparent',border:'none',color:C.textSec,cursor:'pointer',fontSize:12}}>
            건너뛰기
          </button>
        </div>
      </div>
    </div>
  );
}

function DashboardPage() {
  const {state, navigate} = useApp();
  const campaigns = state.campaigns;
  const contacts  = state.contacts;

  const totalSent    = campaigns.filter(c=>c.status==='sent').reduce((s,c)=>s+c.recipients,0);
  const totalOpens   = campaigns.filter(c=>c.status==='sent').reduce((s,c)=>s+c.openCount,0);
  const totalClicks  = campaigns.filter(c=>c.status==='sent').reduce((s,c)=>s+c.clickCount,0);
  const avgOpen      = totalSent > 0 ? ((totalOpens/totalSent)*100).toFixed(1) : '0.0';
  const avgClick     = totalSent > 0 ? ((totalClicks/totalSent)*100).toFixed(1) : '0.0';
  const activeCamps  = campaigns.filter(c=>c.status==='scheduled').length;

  const segments = ['VIP','신규고객','잠재고객'];
  const segStats = segments.map(seg => {
    const segs = contacts.filter(c=>c.segment===seg);
    const avgO = segs.length > 0 ? Math.round(segs.reduce((s,c)=>s+c.openCount,0)/segs.length*10) : 0;
    const colors = {VIP:C.accent, '신규고객':C.success, '잠재고객':C.warning};
    return {name:seg, count:segs.length, rate:Math.min(avgO,100), color:colors[seg]};
  });

  const statusColors = {sent:'green', scheduled:'blue', draft:'gray'};
  const statusLabels = {sent:'발송완료', scheduled:'예약됨', draft:'초안'};

  const settings      = state.settings || {};
  const missingSetup  = [
    !settings.brevoApiKey      && 'Brevo API 키',
    !settings.brevoSenderEmail && '발신자 이메일',
    !settings.geminiApiKey     && 'Gemini API 키',
  ].filter(Boolean);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:24}}>
      {/* 설정 안내 배너 */}
      {missingSetup.length > 0 && (
        <div style={{padding:'13px 18px',background:`${C.warning}11`,border:`1px solid ${C.warning}44`,
          borderRadius:11,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <span style={{fontSize:18}}>⚙️</span>
          <span style={{fontSize:13,fontWeight:700,color:C.warning,flex:1}}>
            시작 전 설정 필요:&nbsp;
            <span style={{fontWeight:400,color:C.textSec}}>{missingSetup.join(', ')} 미설정</span>
          </span>
          <Btn variant="secondary" size="sm" onClick={()=>navigate('settings')}>설정하기</Btn>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:26,fontWeight:800,color:C.text,margin:0}}>대시보드</h1>
          <p style={{color:C.textSec,margin:'4px 0 0',fontSize:13}}>이메일 마케팅 성과를 한눈에 확인하세요</p>
        </div>
        <Btn icon="plus" onClick={()=>navigate('campaigns')}>새 캠페인</Btn>
      </div>

      {/* KPI Cards */}
      <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
        <StatCard label="총 수신자" value={contacts.length.toLocaleString()} sub="등록된 연락처" color={C.accent}/>
        <StatCard label="평균 오픈율" value={`${avgOpen}%`} sub="업계 평균 21%" trend={5.1} color={C.success}/>
        <StatCard label="평균 클릭율" value={`${avgClick}%`} sub="업계 평균 3.5%" trend={2.4} color={C.warning}/>
        <StatCard label="활성 캠페인" value={activeCamps} sub={`예약됨`} color={C.accentL}/>
      </div>

      {/* Charts Row */}
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        {/* Weekly Chart */}
        <Card style={{flex:'2 1 380px'}} title="주간 발송 현황"
          action={
            <div style={{display:'flex',gap:16,fontSize:12,color:C.textSec}}>
              {[['발송',C.accent],['오픈',C.success],['클릭',C.warning]].map(([l,col])=>(
                <span key={l} style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:col,display:'inline-block'}}/>
                  {l}
                </span>
              ))}
            </div>
          }>
          <div style={{display:'flex',gap:16}}>
            <div style={{flex:1}}><MiniBarChart data={WEEKLY_MOCK.map(d=>({label:d.label,value:d.sent}))} color={C.accent} height={120}/></div>
            <div style={{flex:1}}><MiniBarChart data={WEEKLY_MOCK.map(d=>({label:d.label,value:d.opened}))} color={C.success} height={120}/></div>
            <div style={{flex:1}}><MiniBarChart data={WEEKLY_MOCK.map(d=>({label:d.label,value:d.clicked}))} color={C.warning} height={120}/></div>
          </div>
        </Card>

        {/* Segment Performance */}
        <Card style={{flex:'1 1 240px'}} title="세그먼트별 오픈율">
          {segStats.map(seg => (
            <div key={seg.name} style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
                <span style={{color:C.text}}>{seg.name} <span style={{color:C.textMut}}>({seg.count}명)</span></span>
                <span style={{color:seg.color,fontWeight:700}}>{seg.rate}%</span>
              </div>
              <div style={{height:6,background:C.bg,borderRadius:3}}>
                <div style={{height:'100%',borderRadius:3,width:`${seg.rate}%`,
                  background:`linear-gradient(90deg,${seg.color},${seg.color}88)`,transition:'width 0.6s ease'}}/>
              </div>
            </div>
          ))}
        </Card>
      </div>

      {/* Recent Campaigns */}
      <Card title="최근 캠페인"
        action={<Btn variant="ghost" size="sm" onClick={()=>navigate('campaigns')}>전체 보기 →</Btn>}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>{['캠페인명','상태','세그먼트','수신자','오픈율','클릭율','발송일'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'9px 13px',fontSize:12,
                  color:C.textMut,borderBottom:`1px solid ${C.border}`,fontWeight:600,whiteSpace:'nowrap'}}>
                  {h}
                </th>
              ))}</tr>
            </thead>
            <tbody>
              {campaigns.slice(0,5).map(c=>(
                <tr key={c.id}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHov}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{padding:'11px 13px',fontSize:13,color:C.text,fontWeight:500}}>{c.name}</td>
                  <td style={{padding:'11px 13px'}}><Badge text={statusLabels[c.status]} color={statusColors[c.status]}/></td>
                  <td style={{padding:'11px 13px',fontSize:12,color:C.textSec}}>{c.segment}</td>
                  <td style={{padding:'11px 13px',fontSize:13,color:C.textSec}}>{c.recipients.toLocaleString()}</td>
                  <td style={{padding:'11px 13px',fontSize:13,fontWeight:600,color:c.recipients>0?C.success:C.textMut}}>
                    {c.recipients>0 ? `${((c.openCount/c.recipients)*100).toFixed(1)}%` : '—'}
                  </td>
                  <td style={{padding:'11px 13px',fontSize:13,fontWeight:600,color:c.recipients>0?C.warning:C.textMut}}>
                    {c.recipients>0 ? `${((c.clickCount/c.recipients)*100).toFixed(1)}%` : '—'}
                  </td>
                  <td style={{padding:'11px 13px',fontSize:12,color:C.textSec}}>{c.sentAt||'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ── OneDrive Section 컴포넌트 (7단계) ── */
function OneDriveSection({ form, upd, state, dispatch, toast }) {
  const [odStatus, setOdStatus]   = useState('idle');   // idle | connecting | syncing | loading | done | error
  const [odMsg,    setOdMsg]      = useState('');
  const [odAccount, setOdAccount] = useState(() => OneDriveSvc.getAccountName());
  const [showClientId, setShowClientId] = useState(false);
  const isConnected = !!odAccount && OneDriveSvc.isLoggedIn();

  /* 저장된 clientId로 자동 init (이미 로그인 상태 복원) */
  useEffect(() => {
    const cid = form.msalClientId || state.settings?.msalClientId;
    if (cid && window.msal) {
      const ok = OneDriveSvc.init(cid);
      if (ok) setOdAccount(OneDriveSvc.getAccountName());
    }
  }, []);

  /* 설정 즉시 저장 헬퍼 */
  const saveWith = (patch) => dispatch({type:'SET_SETTINGS', data:{...form, ...patch}});

  /* OneDrive 연결 (로그인) */
  const handleConnect = async () => {
    const cid = form.msalClientId;
    if (!cid) { setOdMsg('Azure App Client ID를 먼저 입력해주세요.'); setOdStatus('error'); return; }
    if (!window.msal) { setOdMsg('MSAL.js 로드 실패. 인터넷 연결을 확인해주세요.'); setOdStatus('error'); return; }
    setOdStatus('connecting'); setOdMsg('Microsoft 로그인 팝업 열기...');
    try {
      OneDriveSvc.init(cid);
      const account = await OneDriveSvc.login();
      setOdAccount(account.name || account.username);
      saveWith({ oneDriveConnected:true, msalClientId:cid });
      setOdStatus('done'); setOdMsg(`✅ ${account.name || account.username} 로 연결됨`);
    } catch(e) { setOdStatus('error'); setOdMsg(`연결 실패: ${e.message}`); }
  };

  /* 연결 해제 */
  const handleDisconnect = () => {
    OneDriveSvc.logout();
    setOdAccount(null);
    saveWith({ oneDriveConnected:false, oneDriveLastSync:null });
    setOdStatus('idle'); setOdMsg('');
  };

  /* OneDrive로 저장 (업로드) */
  const handleSync = async () => {
    if (!OneDriveSvc.isLoggedIn()) { setOdMsg('먼저 OneDrive에 연결해주세요.'); setOdStatus('error'); return; }
    setOdStatus('syncing'); setOdMsg('OneDrive에 업로드 중...');
    try {
      const ts = await OneDriveSvc.syncAll({
        contacts:    state.contacts,
        campaigns:   state.campaigns,
        templates:   state.templates,
        automations: state.automations,
      });
      saveWith({ oneDriveLastSync:ts });
      setOdStatus('done'); setOdMsg(`✅ 동기화 완료 (${new Date(ts).toLocaleString('ko-KR')})`);
      toast('OneDrive 동기화 완료!');
    } catch(e) { setOdStatus('error'); setOdMsg(`동기화 실패: ${e.message}`); }
  };

  /* OneDrive에서 불러오기 (다운로드) */
  const handleLoad = async () => {
    if (!OneDriveSvc.isLoggedIn()) { setOdMsg('먼저 OneDrive에 연결해주세요.'); setOdStatus('error'); return; }
    if (!confirm('OneDrive 데이터를 불러오면 현재 로컬 데이터를 덮어씁니다. 계속할까요?')) return;
    setOdStatus('loading'); setOdMsg('OneDrive에서 데이터 다운로드 중...');
    try {
      const data = await OneDriveSvc.loadAll();
      let loaded = 0;
      if (data.contacts    && data.contacts.length    > 0) { dispatch({type:'SET_CONTACTS',    data:data.contacts});    loaded++; }
      if (data.campaigns   && data.campaigns.length   > 0) { dispatch({type:'SET_CAMPAIGNS',   data:data.campaigns});   loaded++; }
      if (data.templates   && data.templates.length   > 0) { dispatch({type:'SET_TEMPLATES',   data:data.templates});   loaded++; }
      if (data.automations && data.automations.length > 0) { dispatch({type:'SET_AUTOMATIONS', data:data.automations}); loaded++; }
      const ts = new Date().toISOString();
      saveWith({ oneDriveLastSync: ts });
      setOdStatus('done'); setOdMsg(`✅ ${loaded}개 데이터 로드 완료 (${new Date(ts).toLocaleString('ko-KR')})`);
      toast(`OneDrive에서 데이터 로드 완료 (${loaded}개)`);
    } catch(e) { setOdStatus('error'); setOdMsg(`불러오기 실패: ${e.message}`); }
  };

  /* 로컬 JSON 백업 다운로드 */
  const handleBackup = () => {
    const data = { contacts:state.contacts, campaigns:state.campaigns,
      templates:state.templates, automations:state.automations,
      exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    Object.assign(document.createElement('a'),{href:url,download:`mailflow-backup-${Date.now()}.json`}).click();
    URL.revokeObjectURL(url);
    toast('로컬 백업 파일을 다운로드했습니다');
  };

  /* JSON 파일에서 복원 */
  const handleRestore = () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = async (e) => {
      try {
        const text = await e.target.files[0].text();
        const data = JSON.parse(text);
        if (data.contacts)    dispatch({type:'SET_CONTACTS',    data:data.contacts});
        if (data.campaigns)   dispatch({type:'SET_CAMPAIGNS',   data:data.campaigns});
        if (data.templates)   dispatch({type:'SET_TEMPLATES',   data:data.templates});
        if (data.automations) dispatch({type:'SET_AUTOMATIONS', data:data.automations});
        toast('JSON 파일에서 데이터 복원 완료!');
      } catch(err) { toast('파일 파싱 실패: '+err.message, 'error'); }
    };
    input.click();
  };

  const statusColor = { idle:'transparent', connecting:C.warning, syncing:C.accent, loading:C.accent, done:C.success, error:'#FF6363' };
  const lastSync = form.oneDriveLastSync || state.settings?.oneDriveLastSync;

  return (
    <Card style={{marginBottom:16}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${C.border}`}}>
        <div style={{width:36,height:36,borderRadius:10,background:`${C.accent}20`,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="cloud" size={18} color={C.accentL}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text}}>OneDrive 데이터 저장</div>
        </div>
        <Badge text={isConnected?'연결됨':'미연결'} color={isConnected?'green':'red'}/>
      </div>

      {/* Azure 앱 등록 안내 */}
      <div style={{padding:'12px 16px',borderRadius:R.lg,background:C.bg,border:`1px solid ${C.border}`,fontSize:13,color:C.textSec,lineHeight:1.9,marginBottom:16}}>
        <b style={{color:C.warning}}>Azure 앱 등록 필요</b>: Microsoft Entra ID(구 Azure AD)에서 앱을 먼저 등록해야 합니다.<br/>
        <a href="https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps" target="_blank" style={{color:C.accentL,textDecoration:'none'}}>→ portal.azure.com</a>
        {' '}에서 새 앱 등록 → Redirect URI: <code style={{background:C.surface2,padding:'1px 5px',borderRadius:3,fontSize:12}}>{window.location.href.split('?')[0].split('#')[0]}</code>
        {' '}→ API 권한: <code style={{background:C.surface2,padding:'1px 5px',borderRadius:3,fontSize:12}}>Files.ReadWrite</code> 추가
      </div>

      {/* Client ID 입력 */}
      <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:16}}>
        <Input label="Azure App Client ID (Application ID)" value={form.msalClientId||''}
          onChange={e=>upd('msalClientId', e.target.value)}
          placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
          type={showClientId?'text':'password'} style={{flex:1}}/>
        <Btn variant="ghost" size="sm" onClick={()=>setShowClientId(!showClientId)} style={{marginBottom:0}}>
          <Icon name="eye" size={15}/>
        </Btn>
      </div>

      {/* 연결/해제 버튼 */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
        {!isConnected ? (
          <Btn variant="primary" onClick={handleConnect} disabled={odStatus==='connecting'}>
            {odStatus==='connecting' ? '연결 중...' : '🔗 OneDrive 연결'}
          </Btn>
        ) : (
          <Btn variant="danger" onClick={handleDisconnect}>🔌 연결 해제</Btn>
        )}
        {isConnected && (<>
          <Btn variant="secondary" onClick={handleSync} disabled={odStatus==='syncing'}>
            {odStatus==='syncing' ? '저장 중...' : '☁️ OneDrive로 저장'}
          </Btn>
          <Btn variant="secondary" onClick={handleLoad} disabled={odStatus==='loading'}>
            {odStatus==='loading' ? '로드 중...' : '⬇️ OneDrive에서 불러오기'}
          </Btn>
        </>)}
      </div>

      {/* 연결 계정 정보 */}
      {isConnected && odAccount && (
        <div style={{padding:'10px 14px',background:`${C.success}11`,border:`1px solid ${C.success}44`,
          borderRadius:8,fontSize:13,color:C.success,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:16}}>👤</span>
          <span>{odAccount} 로 연결됨</span>
          {lastSync && <span style={{marginLeft:'auto',fontSize:11,color:C.textSec}}>마지막 동기화: {new Date(lastSync).toLocaleString('ko-KR')}</span>}
        </div>
      )}

      {/* 상태 메시지 */}
      {odMsg && (
        <div style={{padding:'10px 14px',background:`${statusColor[odStatus]||C.border}22`,
          border:`1px solid ${statusColor[odStatus]||C.border}55`,
          borderRadius:8,fontSize:13,color:statusColor[odStatus]||C.text,marginBottom:12}}>
          {odMsg}
        </div>
      )}

      {/* 로컬 백업/복원 */}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16,marginTop:4}}>
        <p style={{fontSize:12,color:C.textSec,marginBottom:10}}>로컬 백업 (OneDrive 없이 사용 가능)</p>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="secondary" size="sm" icon="upload" onClick={handleBackup}>JSON 내보내기</Btn>
          <Btn variant="secondary" size="sm" icon="upload" onClick={handleRestore}>JSON 가져오기</Btn>
        </div>
      </div>
    </Card>
  );
}

const SYSTEM_FIELDS = [
  {value:'',      label:'-- 무시 --'},
  {value:'email', label:'이메일 (필수)'},
  {value:'name',  label:'이름'},
  {value:'company',label:'회사'},

];
const SEGMENTS = ['전체','VIP','신규고객','잠재고객'];

/* ---- Import Modal ---- */
function ImportModal({ open, onClose, onImport }) {
  const [step, setStep] = useState(1);
  const [csvRows, setCsvRows] = useState([]);
  const [csvHeaders, setCsvHeaders] = useState([]);
  const [fieldMap, setFieldMap] = useState({});
  const [result, setResult] = useState(null);
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();

  const reset = () => { setStep(1); setCsvRows([]); setCsvHeaders([]); setFieldMap({}); setResult(null); };
  const handleClose = () => { reset(); onClose(); };

  const parseFile = (file) => {
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (res) => {
        const headers = res.meta.fields || [];
        setCsvHeaders(headers);
        setCsvRows(res.data);
        // Auto-map obvious columns
        const autoMap = {};
        headers.forEach(h => {
          const lh = h.toLowerCase();
          if (lh.includes('email') || lh.includes('메일')) autoMap[h] = 'email';
          else if (lh.includes('name') || lh.includes('이름')) autoMap[h] = 'name';
          else if (lh.includes('company') || lh.includes('회사') || lh.includes('기업')) autoMap[h] = 'company';
          else if (lh.includes('phone') || lh.includes('tel') || lh.includes('전화')) autoMap[h] = 'phone';
          else if (lh.includes('segment') || lh.includes('세그먼트') || lh.includes('등급')) autoMap[h] = 'segment';
        });
        setFieldMap(autoMap);
        setStep(2);
      }
    });
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.csv') || file.name.endsWith('.tsv'))) parseFile(file);
  };

  const doImport = () => {
    const emailCol = Object.keys(fieldMap).find(k => fieldMap[k] === 'email');
    if (!emailCol) { alert('이메일 컬럼을 반드시 매핑해주세요'); return; }
    const imported = []; const skipped = [];
    csvRows.forEach(row => {
      const email = (row[emailCol]||'').trim().toLowerCase();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { skipped.push(row); return; }
      const contact = { id: 'c_' + Date.now() + Math.random().toString(36).slice(2),
        email, name:'', company:'', phone:'', segment:'신규고객', status:'active',
        openCount:0, clickCount:0, createdAt: new Date().toISOString().slice(0,10) };
      Object.keys(fieldMap).forEach(col => {
        const field = fieldMap[col];
        if (field && field !== 'email') contact[field] = (row[col]||'').trim();
      });
      if (contact.segment && !['VIP','신규고객','잠재고객'].includes(contact.segment)) contact.segment = '신규고객';
      imported.push(contact);
    });
    setResult({ imported, skipped });
    setStep(3);
    onImport(imported);
  };

  if (!open) return null;
  return (
    <Modal open={open} onClose={handleClose} title="CSV 수신자 임포트" width={600}>
      {/* Step indicator */}
      <div style={{display:'flex',gap:0,marginBottom:24}}>
        {[['1','파일 업로드'],['2','필드 매핑'],['3','완료']].map(([n,l],i)=>(
          <div key={n} style={{display:'flex',alignItems:'center',flex:1}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flex:1}}>
              <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',
                justifyContent:'center',fontSize:12,fontWeight:700,
                background: step>i ? C.success : step===i+1 ? C.accent : C.border,
                color: step>=i+1 ? '#fff' : C.textMut}}>{step>i+1?<Icon name="check" size={13}/>:n}</div>
              <span style={{fontSize:11,color:step===i+1?C.text:C.textMut,fontWeight:step===i+1?600:400}}>{l}</span>
            </div>
            {i<2 && <div style={{height:2,width:32,background:step>i+1?C.success:C.border,marginBottom:16,flexShrink:0}}/>}
          </div>
        ))}
      </div>

      {/* Step 1: Upload */}
      {step===1 && (
        <div>
          <div
            onDragOver={e=>{e.preventDefault();setDragging(true)}}
            onDragLeave={()=>setDragging(false)} onDrop={handleDrop}
            onClick={()=>fileRef.current.click()}
            style={{border:`2px dashed ${dragging?C.accent:C.border}`,borderRadius:R.xl,padding:'48px 24px',
              textAlign:'center',cursor:'pointer',transition:'all 0.18s',
              background: dragging?`${C.accent}08`:C.bg}}>
            <div style={{color:C.accentL,marginBottom:12}}><Icon name="upload" size={36}/></div>
            <div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:8}}>CSV 파일을 드래그하거나 클릭하여 선택</div>
            <div style={{fontSize:13,color:C.textSec}}>UTF-8 또는 EUC-KR 인코딩 지원 · 첫 번째 행은 헤더</div>
            <input ref={fileRef} type="file" accept=".csv,.tsv" style={{display:'none'}}
              onChange={e=>e.target.files[0]&&parseFile(e.target.files[0])}/>
          </div>
          <div style={{marginTop:16,padding:'12px 16px',borderRadius:R.md,background:C.bg,
            border:`1px solid ${C.border}`,fontSize:13,color:C.textSec}}>
            <b style={{color:C.text}}>CSV 예시 형식:</b><br/>
            <code style={{fontFamily:'monospace',color:C.accentL}}>이름,이메일,회사,세그먼트<br/>
            김철수,kim@example.com,삼성전자,VIP</code>
          </div>
        </div>
      )}

      {/* Step 2: Field Mapping */}
      {step===2 && (
        <div>
          <p style={{fontSize:13,color:C.textSec,marginBottom:16}}>
            CSV의 각 컬럼을 시스템 필드에 매핑해주세요. <b style={{color:C.warning}}>이메일은 필수</b>입니다.
          </p>
          <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:280,overflowY:'auto',marginBottom:16}}>
            {csvHeaders.map(h=>(
              <div key={h} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                borderRadius:R.md,background:C.bg,border:`1px solid ${C.border}`}}>
                <span style={{flex:1,fontSize:13,color:C.text,fontWeight:500}}>{h}</span>
                <span style={{fontSize:12,color:C.textMut,maxWidth:120,overflow:'hidden',
                  textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  예: {String(csvRows[0]?.[h]||'').slice(0,18)}
                </span>
                <select value={fieldMap[h]||''} onChange={e=>setFieldMap(p=>({...p,[h]:e.target.value}))}
                  style={{padding:'6px 10px',borderRadius:R.md,border:`1px solid ${C.border}`,
                    background:C.surface,color: fieldMap[h]?C.text:C.textMut,fontSize:12,cursor:'pointer',
                    outline:'none',fontFamily:'inherit'}}>
                  {SYSTEM_FIELDS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div style={{fontSize:12,color:C.textSec,marginBottom:20}}>
            총 <b style={{color:C.text}}>{csvRows.length}건</b> 데이터 감지됨
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <Btn variant="secondary" onClick={()=>setStep(1)}>이전</Btn>
            <Btn icon="upload" onClick={doImport}>임포트 실행</Btn>
          </div>
        </div>
      )}

      {/* Step 3: Result */}
      {step===3 && result && (
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:16}}>✅</div>
          <h3 style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:8}}>임포트 완료</h3>
          <div style={{display:'flex',gap:16,justifyContent:'center',marginBottom:24,flexWrap:'wrap'}}>
            <div style={{padding:'16px 28px',borderRadius:R.lg,background:`${C.success}15`,
              border:`1px solid ${C.success}30`,textAlign:'center'}}>
              <div style={{fontSize:28,fontWeight:800,color:C.success}}>{result.imported.length}</div>
              <div style={{fontSize:13,color:C.textSec}}>성공</div>
            </div>
            <div style={{padding:'16px 28px',borderRadius:R.lg,background:`${C.danger}15`,
              border:`1px solid ${C.danger}30`,textAlign:'center'}}>
              <div style={{fontSize:28,fontWeight:800,color:C.danger}}>{result.skipped.length}</div>
              <div style={{fontSize:13,color:C.textSec}}>건너뜀 (이메일 오류)</div>
            </div>
          </div>
          <Btn icon="check" onClick={handleClose}>완료</Btn>
        </div>
      )}
    </Modal>
  );
}

/* ---- Contact Modal (Add/Edit) ---- */
function ContactModal({ open, contact, onClose, onSave }) {
  const [form, setForm] = useState({
    name:'', email:'', company:'', phone:'', segment:'신규고객', status:'active'
  });
  useEffect(()=>{
    if (contact) setForm({name:contact.name||'',email:contact.email||'',
      company:contact.company||'',phone:contact.phone||'',
      segment:contact.segment||'신규고객',status:contact.status||'active'});
    else setForm({name:'',email:'',company:'',phone:'',segment:'신규고객',status:'active'});
  }, [contact, open]);

  const upd = (k,v) => setForm(p=>({...p,[k]:v}));
  const handleSave = () => {
    if (!form.email.trim()) { alert('이메일은 필수입니다'); return; }

  };

  return (
    <Modal open={open} onClose={onClose} title={contact ? '수신자 편집' : '수신자 추가'} width={480}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>

          <Input label="이메일 *" value={form.email} onChange={v=>upd('email',v)}
            placeholder="hong@example.com" type="email" style={{flex:1.4}}/>
        </div>
        <div style={{display:'flex',gap:12}}>
          <Input label="회사" value={form.company} onChange={v=>upd('company',v)} placeholder="(주)예시" style={{flex:1}}/>
          <Input label="전화번호" value={form.phone} onChange={v=>upd('phone',v)} placeholder="010-0000-0000" style={{flex:1}}/>
        </div>
        <div style={{display:'flex',gap:12}}>
          <Select label="세그먼트" value={form.segment} onChange={v=>upd('segment',v)}
            options={['VIP','신규고객','잠재고객'].map(s=>({value:s,label:s}))} style={{flex:1}}/>
          <Select label="상태" value={form.status} onChange={v=>upd('status',v)}
            options={[{value:'active',label:'활성'},{value:'inactive',label:'비활성'}]} style={{flex:1}}/>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
          <Btn variant="secondary" onClick={onClose}>취소</Btn>
          <Btn icon="check" onClick={handleSave}>저장</Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ---- Main Contacts Page ---- */
function ContactsPage() {
  const {state, dispatch, toast} = useApp();
  const contacts = state.contacts;

  const [search, setSearch]         = useState('');
  const [filterSeg, setFilterSeg]   = useState('전체');
  const [filterStat, setFilterStat] = useState('전체');
  const [sortKey, setSortKey]       = useState('createdAt');
  const [sortDir, setSortDir]       = useState('desc');
  const [page, setPage]             = useState(1);
  const [selected, setSelected]     = useState([]);
  const [showImport, setShowImport] = useState(false);
  const [editContact, setEditContact]   = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [bulkSeg, setBulkSeg]       = useState('');

  // Filter & sort
  const filtered = contacts.filter(c => {
    const matchSeg  = filterSeg==='전체' || c.segment===filterSeg;
    const matchStat = filterStat==='전체' || c.status===filterStat;
    const q = search.toLowerCase();
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q)
      || (c.company||'').toLowerCase().includes(q);
    return matchSeg && matchStat && matchQ;
  }).sort((a,b)=>{
    let av = a[sortKey]||'', bv = b[sortKey]||'';
    if (typeof av==='number') return sortDir==='asc' ? av-bv : bv-av;
    return sortDir==='asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const pageData   = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const allPageSelected = pageData.length>0 && pageData.every(c=>selected.includes(c.id));

  const sortToggle = (key) => {
    if (sortKey===key) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('asc'); }
    setPage(1);
  };
  const SortIcon = ({k}) => sortKey===k
    ? <Icon name={sortDir==='asc'?'arrowUp':'arrowDown'} size={11} style={{marginLeft:3,color:C.accentL}}/>
    : null;

  // CRUD
  const saveContact = (form) => {
    if (editContact) {
      const updated = contacts.map(c=>c.id===editContact.id ? {...c,...form} : c);
      dispatch({type:'SET_CONTACTS', data:updated});
      toast('수신자 정보가 수정되었습니다');
    } else {
      const nc = {...form, id:'c_'+Date.now(), openCount:0, clickCount:0,
        createdAt:new Date().toISOString().slice(0,10)};
      dispatch({type:'SET_CONTACTS', data:[nc,...contacts]});
      toast('수신자가 추가되었습니다', 'success');
    }
    setEditContact(null); setShowAddModal(false);
  };

  const deleteContact = (id) => {
    dispatch({type:'SET_CONTACTS', data:contacts.filter(c=>c.id!==id)});
    setSelected(s=>s.filter(x=>x!==id));
    setDeleteTarget(null);
    toast('삭제되었습니다', 'info');
  };

  const bulkDelete = () => {
    dispatch({type:'SET_CONTACTS', data:contacts.filter(c=>!selected.includes(c.id))});
    toast(`${selected.length}명이 삭제되었습니다`);
    setSelected([]);
  };

  const bulkChangeSeg = () => {
    if (!bulkSeg) return;
    dispatch({type:'SET_CONTACTS', data:contacts.map(c=>selected.includes(c.id)?{...c,segment:bulkSeg}:c)});
    toast(`${selected.length}명의 세그먼트가 변경되었습니다`);
    setSelected([]); setBulkSeg('');
  };

  const handleImport = (imported) => {
    const existEmails = new Set(contacts.map(c=>c.email));
    const newOnes = imported.filter(c=>!existEmails.has(c.email));
    const dupes = imported.length - newOnes.length;
    dispatch({type:'SET_CONTACTS', data:[...contacts, ...newOnes]});
    toast(`${newOnes.length}명 추가${dupes>0?`, ${dupes}명 중복 건너뜀`:''}`);
  };

  const exportCSV = () => {
    const rows = [['이름','이메일','회사','전화','세그먼트','상태','오픈','클릭','등록일']];
    filtered.forEach(c=>rows.push([c.name,c.email,c.company||'',c.phone||'',
      c.segment,c.status,c.openCount,c.clickCount,c.createdAt]));
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='contacts.csv'; a.click();
    toast('CSV 파일이 다운로드되었습니다');
  };

  // Segment counts
  const segCounts = SEGMENTS.reduce((acc,s)=>{
    acc[s] = s==='전체' ? contacts.length : contacts.filter(c=>c.segment===s).length;
    return acc;
  },{});

  const COL_HDR = {fontSize:12,color:C.textMut,borderBottom:`1px solid ${C.border}`,
    fontWeight:600,padding:'10px 13px',textAlign:'left',background:C.surface,
    userSelect:'none',whiteSpace:'nowrap'};
  const COL_TD  = {padding:'11px 13px',fontSize:13,borderBottom:`1px solid ${C.border}99`};

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:26,fontWeight:800,color:C.text,margin:0}}>수신자 관리</h1>
          <p style={{color:C.textSec,margin:'4px 0 0',fontSize:13}}>
            총 <b style={{color:C.text}}>{contacts.length.toLocaleString()}</b>명 등록됨
          </p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <Btn variant="secondary" icon="upload" onClick={()=>setShowImport(true)}>CSV 임포트</Btn>
          <Btn variant="secondary" icon="arrowDown" onClick={exportCSV}>내보내기</Btn>
          <Btn icon="plus" onClick={()=>{setEditContact(null);setShowAddModal(true);}}>수신자 추가</Btn>
        </div>
      </div>

      {/* Segment Tabs */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {SEGMENTS.map(seg=>(
          <button key={seg} onClick={()=>{setFilterSeg(seg);setPage(1);setSelected([]);}} style={{
            padding:'8px 16px',borderRadius:R.md,border:`1px solid ${filterSeg===seg?C.accent:C.border}`,
            cursor:'pointer',fontSize:13,fontWeight:filterSeg===seg?700:400,transition:'all 0.18s',
            background:filterSeg===seg?C.accentGlow:C.card,
            color:filterSeg===seg?C.accentL:C.textSec
          }}>
            {seg}
            <span style={{marginLeft:6,fontSize:11,fontWeight:700,
              color:filterSeg===seg?C.accentL:C.textMut}}>({segCounts[seg]})</span>
          </button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
          <select value={filterStat} onChange={e=>{setFilterStat(e.target.value);setPage(1);}}
            style={{padding:'7px 12px',borderRadius:R.md,border:`1px solid ${C.border}`,
              background:C.card,color:C.textSec,fontSize:12,outline:'none',cursor:'pointer',fontFamily:'inherit'}}>
            <option value="전체">전체 상태</option>
            <option value="active">활성</option>
            <option value="inactive">비활성</option>
          </select>
        </div>
      </div>

      {/* Search + Bulk bar */}
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{flex:'1 1 240px',display:'flex',alignItems:'center',gap:8,
          background:C.card,borderRadius:R.md,padding:'0 14px',border:`1px solid ${C.border}`}}>
          <Icon name="search" size={15} style={{color:C.textMut,flexShrink:0}}/>
          <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}
            placeholder="이름, 이메일, 회사 검색..."
            style={{flex:1,padding:'10px 0',background:'transparent',border:'none',
              color:C.text,fontSize:13,outline:'none'}}/>
          {search && <button onClick={()=>setSearch('')} style={{background:'none',border:'none',cursor:'pointer',color:C.textMut}}>
            <Icon name="x" size={13}/>
          </button>}
        </div>
        {selected.length>0 && (
          <div style={{display:'flex',gap:8,alignItems:'center',padding:'6px 14px',
            borderRadius:R.md,background:`${C.warning}15`,border:`1px solid ${C.warning}30`}}>
            <span style={{fontSize:13,color:C.warning,fontWeight:600}}>{selected.length}명 선택됨</span>
            <select value={bulkSeg} onChange={e=>setBulkSeg(e.target.value)}
              style={{padding:'4px 8px',borderRadius:R.md,border:`1px solid ${C.border}`,
                background:C.surface,color:C.text,fontSize:12,outline:'none',fontFamily:'inherit'}}>
              <option value="">세그먼트 변경...</option>
              {['VIP','신규고객','잠재고객'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <Btn variant="secondary" size="sm" onClick={bulkChangeSeg} disabled={!bulkSeg}>적용</Btn>
            <Btn variant="danger" size="sm" icon="trash" onClick={bulkDelete}>삭제</Btn>
            <Btn variant="ghost" size="sm" onClick={()=>setSelected([])}>취소</Btn>
          </div>
        )}
      </div>

      {/* Table */}
      <div style={{background:C.card,borderRadius:R.xl,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>
                <th style={{...COL_HDR,width:40}}>
                  <input type="checkbox" checked={allPageSelected}
                    onChange={e=>setSelected(e.target.checked?[...new Set([...selected,...pageData.map(c=>c.id)])]:selected.filter(id=>!pageData.find(c=>c.id===id)))}
                    style={{cursor:'pointer',accentColor:C.accent}}/>
                </th>
                {[['name','이름'],['email','이메일'],['company','회사'],['segment','세그먼트'],
                  ['status','상태'],['openCount','오픈'],['clickCount','클릭'],['createdAt','등록일']].map(([k,l])=>(
                  <th key={k} style={{...COL_HDR,cursor:'pointer'}} onClick={()=>sortToggle(k)}>
                    {l}<SortIcon k={k}/>
                  </th>
                ))}
                <th style={{...COL_HDR,width:80}}>액션</th>
              </tr>
            </thead>
            <tbody>
              {pageData.length===0 ? (
                <tr><td colSpan={10} style={{textAlign:'center',padding:'48px',color:C.textMut,fontSize:14}}>
                  {search||filterSeg!=='전체' ? '검색 결과가 없습니다' : '수신자가 없습니다. CSV를 임포트하거나 직접 추가하세요.'}
                </td></tr>
              ) : pageData.map(c=>(
                <tr key={c.id}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHov}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{...COL_TD,borderBottom:`1px solid ${C.border}44`}}>
                    <input type="checkbox" checked={selected.includes(c.id)}
                      onChange={e=>setSelected(e.target.checked?[...selected,c.id]:selected.filter(x=>x!==c.id))}
                      style={{cursor:'pointer',accentColor:C.accent}}/>
                  </td>
                  <td style={{...COL_TD,fontWeight:600,color:C.text}}>{c.name||<span style={{color:C.textMut}}>—</span>}</td>
                  <td style={{...COL_TD,color:C.textSec}}>{c.email}</td>
                  <td style={{...COL_TD,color:C.textSec}}>{c.company||<span style={{color:C.textMut}}>—</span>}</td>
                  <td style={{...COL_TD}}><Badge text={c.segment} color={SEG_COLORS[c.segment]||'gray'}/></td>
                  <td style={{...COL_TD}}><Badge text={c.status==='active'?'활성':'비활성'} color={c.status==='active'?'green':'gray'}/></td>
                  <td style={{...COL_TD,color:C.text,fontWeight:600}}>{c.openCount}</td>
                  <td style={{...COL_TD,color:C.text,fontWeight:600}}>{c.clickCount}</td>
                  <td style={{...COL_TD,color:C.textMut,fontSize:12}}>{c.createdAt}</td>
                  <td style={{...COL_TD}}>
                    <div style={{display:'flex',gap:4}}>
                      <Btn variant="ghost" size="sm" icon="edit" onClick={()=>{setEditContact(c);setShowAddModal(true);}}/>
                      <Btn variant="ghost" size="sm" icon="trash" onClick={()=>setDeleteTarget(c.id)}
                        style={{color:C.danger}}/>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Pagination */}
        {totalPages > 1 && (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'12px 18px',borderTop:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,color:C.textSec}}>
              {filtered.length}명 중 {(page-1)*PER_PAGE+1}–{Math.min(page*PER_PAGE,filtered.length)}명 표시
            </span>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <Btn variant="ghost" size="sm" icon="chevronLeft" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}/>
              {Array.from({length:Math.min(totalPages,7)},(_,i)=>{
                const p = totalPages<=7 ? i+1 : page<=4 ? i+1 : page>=totalPages-3 ? totalPages-6+i : page-3+i;
                return (
                  <button key={p} onClick={()=>setPage(p)} style={{
                    width:32,height:32,borderRadius:R.md,border:'none',cursor:'pointer',fontSize:13,
                    background:page===p?C.accent:C.card,
                    color:page===p?'#fff':C.textSec,fontWeight:page===p?700:400,fontFamily:'inherit'}}>
                    {p}
                  </button>
                );
              })}
              <Btn variant="ghost" size="sm" icon="chevronRight" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}/>
            </div>
          </div>
        )}
      </div>

      {/* Modals */}
      <ImportModal open={showImport} onClose={()=>setShowImport(false)} onImport={handleImport}/>
      <ContactModal open={showAddModal} contact={editContact}
        onClose={()=>{setShowAddModal(false);setEditContact(null);}} onSave={saveContact}/>

      {/* Delete Confirm */}
      <Modal open={!!deleteTarget} onClose={()=>setDeleteTarget(null)} title="수신자 삭제" width={380}>
        <p style={{color:C.textSec,marginBottom:20,fontSize:14}}>
          이 수신자를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.
        </p>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <Btn variant="secondary" onClick={()=>setDeleteTarget(null)}>취소</Btn>
          <Btn variant="danger" icon="trash" onClick={()=>deleteContact(deleteTarget)}>삭제</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ---- 이메일 HTML 빌더 ---- */
function buildEmailHTML(template, contact={}) {
  const replace = (str) => {
    if (!str) return '';
    return str
      .replace(/\{\{이름\}\}/g, contact.name || '고객')
      .replace(/\{\{회사\}\}/g, contact.company || '')
      .replace(/\{\{이메일\}\}/g, contact.email || '')
      .replace(/\{\{날짜\}\}/g, new Date().toLocaleDateString('ko-KR'));
  };
  const heading  = replace(template.heading  || template.name || '');
  const body     = replace(template.body     || '');
  const ctaText  = replace(template.ctaText  || '자세히 보기');
  const ctaUrl   = template.ctaUrl || '#';
  const accent   = template.color || C.accent;

  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${heading}</title></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Apple SD Gothic Neo,Malgun Gothic,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0">
<tr><td align="center" style="padding:40px 20px;">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
  <tr><td style="background:${accent};padding:40px 48px;">
    <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;line-height:1.3;">${heading}</h1>
  </td></tr>
  <tr><td style="padding:40px 48px;">
    <p style="margin:0 0 24px;color:#444;font-size:16px;line-height:1.8;">${body.replace(/\n/g,'<br>')}</p>
    ${ctaText ? `<a href="${ctaUrl}" style="display:inline-block;background:${accent};color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px;">${ctaText}</a>` : ''}
  </td></tr>
  <tr><td style="padding:24px 48px;border-top:1px solid #eee;background:#fafafa;">
    <p style="margin:0;color:#999;font-size:13px;">이 이메일을 원하지 않으신다면 <a href="{{unsubscribe}}" style="color:#999;">수신 거부</a>하세요.</p>
  </td></tr>
</table>
</td></tr>
</table>
</body></html>`;
}

/* ---- Brevo API 발송 ---- */
async function sendViaBrevo({ apiKey, senderName, senderEmail, contacts, template, campaignName, scheduledAt }) {
  const headers = { 'api-key': apiKey, 'Content-Type': 'application/json', 'accept':'application/json' };
  const base = 'https://api.brevo.com/v3';

  // 1단계: 리스트 생성
  const listRes = await fetch(`${base}/contacts/lists`, {
    method:'POST', headers,
    body: JSON.stringify({ name: `MailFlow_${Date.now()}`, folderId: 1 })
  });
  if (!listRes.ok) {
    const e = await listRes.json();
    throw new Error(`리스트 생성 실패: ${e.message||listRes.status}`);
  }
  const { id: listId } = await listRes.json();

  // 2단계: 컨택트 가져오기 (CSV 형식)
  const csvHeader = 'EMAIL;FIRSTNAME;LASTNAME;COMPANY\n';
  const csvRows   = contacts.map(c => {
    const parts = (c.name||'').split(' ');
    const fn = parts[0]||''; const ln = parts.slice(1).join(' ')||'';
    return `${c.email};${fn};${ln};${c.company||''}`;
  }).join('\n');
  const importRes = await fetch(`${base}/contacts/import`, {
    method:'POST', headers,
    body: JSON.stringify({ fileBody: csvHeader+csvRows, listIds:[listId], emailBlacklist:false, smsBlacklist:false, updateExistingContacts:true })
  });
  if (!importRes.ok) {
    const e = await importRes.json();
    throw new Error(`컨택트 임포트 실패: ${e.message||importRes.status}`);
  }
  // 임포트 처리 대기 (비동기)
  await new Promise(r => setTimeout(r, 2500));

  // 3단계: 캠페인 생성
  const htmlContent = buildEmailHTML(template, {});
  const campBody = {
    name: campaignName,
    subject: template.subject || template.name || campaignName,
    sender: { name: senderName, email: senderEmail },
    type: 'classic',
    htmlContent,
    recipients: { listIds: [listId] },
  };
  if (scheduledAt) campBody.scheduledAt = scheduledAt;

  const campRes = await fetch(`${base}/emailCampaigns`, {
    method:'POST', headers,
    body: JSON.stringify(campBody)
  });
  if (!campRes.ok) {
    const e = await campRes.json();
    throw new Error(`캠페인 생성 실패: ${e.message||campRes.status}`);
  }
  const { id: campaignId } = await campRes.json();

  // 4단계: 즉시 발송 또는 예약
  if (!scheduledAt) {
    const sendRes = await fetch(`${base}/emailCampaigns/${campaignId}/sendNow`, { method:'POST', headers });
    if (!sendRes.ok && sendRes.status !== 204) {
      const e = await sendRes.json().catch(()=>({}));
      throw new Error(`발송 실패: ${e.message||sendRes.status}`);
    }
  }

  return { campaignId, listId };
}

/* ---- 세그먼트 필터 ---- */
function filterBySegment(contacts, seg) {
  if (!seg || seg.type === 'all') return contacts;
  if (seg.type === 'tag' && seg.value) return contacts.filter(c => c.tags && c.tags.includes(seg.value));
  return contacts;
}

/* ---- Campaign Editor Modal ---- */
function CampaignEditor({ open, campaign, onClose, onSave }) {
  const { state } = useApp();
  const blank = { name:'', templateId:'', segment:{ type:'all', value:'' }, scheduledAt:'', status:'draft' };
  const [form, setForm] = useState(blank);
  const [previewHtml, setPreviewHtml] = useState('');
  const upd = (k,v) => setForm(p=>({...p,[k]:v}));
  const updSeg = (k,v) => setForm(p=>({...p, segment:{...p.segment,[k]:v}}));

  useEffect(() => {
    if (open) setForm(campaign ? { ...blank, ...campaign } : blank);
  }, [open, campaign]);

  const templates  = state.templates || [];
  const contacts   = state.contacts  || [];
  const allTags    = [...new Set(contacts.flatMap(c=>c.tags||[]))].filter(Boolean);
  const selTmpl    = templates.find(t=>t.id===form.templateId);
  const segContacts = filterBySegment(contacts, form.segment);

  useEffect(() => {
    if (selTmpl) setPreviewHtml(buildEmailHTML(selTmpl, { name:'홍길동', company:'(주)예시', email:'example@email.com' }));
    else setPreviewHtml('');
  }, [form.templateId]);

  const valid = form.name.trim() && form.templateId;

  const handleSave = () => {
    const now = new Date().toISOString();
    const obj = {
      ...form, name: form.name.trim(),
      id: campaign?.id || `camp_${Date.now()}`,
      createdAt: campaign?.createdAt || now,
      status: form.scheduledAt ? 'scheduled' : 'draft',
      recipients: segContacts.length,
      brevoId: campaign?.brevoId || null,
      openRate: campaign?.openRate || null,
      clickRate: campaign?.clickRate || null,
      sentAt: campaign?.sentAt || null,
    };
    onSave(obj);
  };

  const minDt = () => {
    const d = new Date(); d.setMinutes(d.getMinutes()+10);
    return d.toISOString().slice(0,16);
  };

  return (
    <Modal open={open} onClose={onClose} title={campaign ? '캠페인 수정':'새 캠페인'} width={760}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* 왼쪽 설정 */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:6}}>캠페인 이름 *</label>
            <Input value={form.name} onChange={e=>upd('name',e.target.value)} placeholder="예: 3월 봄 프로모션"/>
          </div>

          <div>
            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:6}}>이메일 템플릿 *</label>
            <Select value={form.templateId} onChange={e=>upd('templateId',e.target.value)} style={{width:'100%'}}>
              <option value="">-- 템플릿 선택 --</option>
              {templates.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </Select>
          </div>

          <div>
            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:8}}>수신자 세그먼트</label>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              {['all','tag'].map(type=>(
                <button key={type} onClick={()=>updSeg('type',type)}
                  style={{padding:'6px 14px',borderRadius:6,border:`1.5px solid ${form.segment.type===type?C.accent:C.border}`,
                    background:form.segment.type===type?`${C.accent}22`:'transparent',
                    color:form.segment.type===type?C.accent:C.textSec,cursor:'pointer',fontSize:13,fontWeight:form.segment.type===type?600:400}}>
                  {type==='all'?'전체':'태그별'}
                </button>
              ))}
            </div>
            {form.segment.type==='tag' && (
              <Select value={form.segment.value} onChange={e=>updSeg('value',e.target.value)} style={{width:'100%'}}>
                <option value="">-- 태그 선택 --</option>
                {allTags.map(t=><option key={t} value={t}>{t}</option>)}
              </Select>
            )}
            <div style={{marginTop:8,padding:'8px 12px',background:C.surface2,borderRadius:6,fontSize:12,color:C.textSec}}>
              수신자: <strong style={{color:C.text}}>{segContacts.length.toLocaleString()}명</strong>
              {contacts.length > 0 && <span style={{marginLeft:8}}>(전체 {contacts.length}명)</span>}
            </div>
          </div>

          <div>
            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:6}}>발송 시간</label>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              {['now','later'].map(t=>(
                <button key={t} onClick={()=>{ upd('scheduledAt', t==='now'?'':'minDt'); }}

                style={{width:'100%',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,

              ? <iframe srcDoc={previewHtml} style={{width:'100%',height:'100%',minHeight:300,border:'none'}} sandbox="allow-same-origin"/>
