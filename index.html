      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>

        <Btn variant="primary" icon="save" onClick={handleSave} disabled={!valid}>저장</Btn>
      </div>
    </Modal>
  );
}

/* ---- Send Confirm Modal ---- */
function SendConfirmModal({ open, campaign, onClose, onConfirm }) {
  const { state } = useApp();
  const [step, setStep]         = useState('confirm'); // confirm | sending | done | error
  const [progress, setProgress] = useState(0);
  const [progressMsg, setProgressMsg] = useState('');
  const [errMsg, setErrMsg]     = useState('');
  const [brevoResult, setBrevoResult] = useState(null);

  useEffect(() => { if (open) { setStep('confirm'); setProgress(0); setErrMsg(''); setBrevoResult(null); } }, [open]);

  if (!campaign) return null;

  const settings    = state.settings || {};
  const contacts    = state.contacts || [];
  const templates   = state.templates || [];
  const template    = templates.find(t=>t.id===campaign.templateId);
  const segContacts = filterBySegment(contacts, campaign.segment);

  const handleSend = async () => {
    if (!settings.brevoApiKey) { setErrMsg('설정 > Brevo API 키를 먼저 입력해주세요.'); setStep('error'); return; }
    if (!settings.brevoSenderEmail) { setErrMsg('설정 > 발신자 이메일을 먼저 입력해주세요.'); setStep('error'); return; }
    if (!template) { setErrMsg('템플릿을 찾을 수 없습니다.'); setStep('error'); return; }
    if (segContacts.length === 0) { setErrMsg('수신자가 없습니다.'); setStep('error'); return; }

    setStep('sending'); setProgress(10); setProgressMsg('Brevo 리스트 생성 중...');
    try {
      setProgress(30); setProgressMsg('수신자 데이터 업로드 중...');
      await new Promise(r=>setTimeout(r,400));
      setProgress(55); setProgressMsg('이메일 캠페인 생성 중...');
      const result = await sendViaBrevo({
        apiKey: settings.brevoApiKey,
        senderName: settings.brevoSender || 'MailFlow',
        senderEmail: settings.brevoSenderEmail,
        contacts: segContacts,
        template,
        campaignName: campaign.name,
        scheduledAt: campaign.scheduledAt && campaign.scheduledAt !== 'minDt' ? campaign.scheduledAt : null,
      });
      setBrevoResult(result);
      setProgress(100); setProgressMsg('완료!');
      setStep('done');
      onConfirm({ ...campaign, status: campaign.scheduledAt?'scheduled':'sent', sentAt: new Date().toISOString(), recipients: segContacts.length, brevoId: result.campaignId });
    } catch(e) {
      setErrMsg(e.message); setStep('error');
    }
  };

  const previewHtml = template ? buildEmailHTML(template, { name:'홍길동', email:'example@email.com' }) : '';

  const STEPS_LABEL = { confirm:'발송 확인', sending:'발송 중...', done:'발송 완료', error:'오류 발생' };

  return (
    <Modal open={open} onClose={step==='sending'?undefined:onClose} title={STEPS_LABEL[step]||'발송'} width={680}>
      {(step==='confirm'||step==='error') && (<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          <div style={{background:C.surface2,borderRadius:10,padding:16}}>
            <p style={{margin:'0 0 12px',fontSize:13,fontWeight:600,color:C.textSec}}>캠페인 정보</p>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[['캠페인명',campaign.name],['템플릿',template?.name||'-'],
                ['수신자',`${segContacts.length}명`],
                ['발송',campaign.scheduledAt&&campaign.scheduledAt!=='minDt'?`예약 (${new Date(campaign.scheduledAt).toLocaleString('ko-KR')})`:'즉시 발송']
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span style={{color:C.textSec}}>{k}</span>
                  <span style={{color:C.text,fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden',background:'#fff'}}>
            {previewHtml
              ? <iframe srcDoc={previewHtml} style={{width:'100%',height:'180px',border:'none'}} sandbox="allow-same-origin"/>
              : <div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',color:C.textSec,fontSize:12}}>미리보기 없음</div>}
          </div>
        </div>
        {step==='error' && (
          <div style={{background:'#FF636322',border:`1px solid #FF6363`,borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:13,color:'#FF6363'}}>
            ⚠️ {errMsg}
          </div>
        )}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <Btn variant="secondary" onClick={onClose}>취소</Btn>
          <Btn variant="primary" icon="send" onClick={handleSend}>{step==='error'?'다시 시도':'발송하기'}</Btn>
        </div>
      </>)}

      {step==='sending' && (
        <div style={{textAlign:'center',padding:'32px 0'}}>
          <div style={{fontSize:40,marginBottom:16}}>📤</div>
          <p style={{color:C.text,fontWeight:600,marginBottom:8}}>{progressMsg}</p>
          <p style={{color:C.textSec,fontSize:13,marginBottom:20}}>{segContacts.length}명에게 발송 중...</p>
          <div style={{background:C.border,borderRadius:99,height:8,overflow:'hidden',maxWidth:320,margin:'0 auto'}}>
            <div style={{height:'100%',borderRadius:99,background:C.accent,width:`${progress}%`,transition:'width 0.4s ease'}}/>
          </div>
          <p style={{color:C.textSec,fontSize:12,marginTop:8}}>{progress}%</p>
        </div>
      )}

      {step==='done' && (
        <div style={{textAlign:'center',padding:'32px 0'}}>
          <div style={{fontSize:48,marginBottom:16}}>✅</div>
          <h3 style={{color:C.text,margin:'0 0 8px'}}>발송 {campaign.scheduledAt&&campaign.scheduledAt!=='minDt'?'예약':'완료'}!</h3>
          <p style={{color:C.textSec,fontSize:14,marginBottom:8}}>
            {segContacts.length}명에게 {campaign.scheduledAt&&campaign.scheduledAt!=='minDt'?'예약되었습니다':'이메일을 발송했습니다'}.
          </p>
          {brevoResult && <p style={{color:C.textSec,fontSize:12}}>Brevo Campaign ID: {brevoResult.campaignId}</p>}
          <div style={{marginTop:20}}>
            <Btn variant="primary" onClick={onClose}>확인</Btn>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ---- Campaigns Page ---- */

  const templates  = state.templates  || [];
  const contacts   = state.contacts   || [];

  /* 필터 */
  const filtered = campaigns.filter(c => {
    const matchSearch = !search || c.name.toLowerCase().includes(search.toLowerCase());

    return matchSearch && matchStatus;
  }).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));

  const saveCampaign = (obj) => {
    const existing = campaigns.find(c=>c.id===obj.id);

  };

    const next = campaigns.filter(c=>c.id!==id);
    dispatch({ type:'SET_CAMPAIGNS', data:next });
    setDeleteTarget(null);
    toast('캠페인 삭제됨');

  const handleSendConfirm = (updated) => {
    const next = campaigns.map(c=>c.id===updated.id?updated:c);
    dispatch({ type:'SET_CAMPAIGNS', data:next });
    setShowSend(false); setSendTarget(null);

        <Btn variant="primary" icon="plus" onClick={()=>{setEditCamp(null);setShowEditor(true);}}>새 캠페인</Btn>
      </div>

                <div style={{textAlign:'right',fontSize:13,color:camp.openRate!=null?C.success:C.textSec}}>

                {/* 액션 */}
                <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                  {(camp.status==='draft'||camp.status==='scheduled') && (
                    <button title="발송" onClick={()=>openSend(camp)}
                      style={{padding:'5px 10px',borderRadius:6,border:`1px solid ${C.accent}`,background:`${C.accent}22`,color:C.accent,cursor:'pointer',fontSize:12,fontWeight:600}}>
                      발송

                  )}
                  <button title="수정" onClick={()=>{setEditCamp(camp);setShowEditor(true);}}
                    style={{padding:'5px 8px',borderRadius:6,border:`1px solid ${C.border}`,background:'transparent',color:C.textSec,cursor:'pointer'}}>
                    <Icon name="edit" size={14} color={C.textSec}/>
                  </button>
                  <button title="삭제" onClick={()=>setDeleteTarget(camp.id)}
                    style={{padding:'5px 8px',borderRadius:6,border:`1px solid ${C.border}`,background:'transparent',color:'#FF6363',cursor:'pointer'}}>
                    <Icon name="trash" size={14} color="#FF6363"/>
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Modals */}
      <CampaignEditor open={showEditor} campaign={editCamp} onClose={()=>{setShowEditor(false);setEditCamp(null);}} onSave={saveCampaign}/>
      <SendConfirmModal open={showSend} campaign={sendTarget} onClose={()=>{setShowSend(false);setSendTarget(null);}} onConfirm={handleSendConfirm}/>

      {/* Delete Confirm */}
      <Modal open={!!deleteTarget} onClose={()=>setDeleteTarget(null)} title="캠페인 삭제" width={380}>
        <p style={{color:C.textSec,marginBottom:20,fontSize:14}}>

        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <Btn variant="secondary" onClick={()=>setDeleteTarget(null)}>취소</Btn>
          <Btn variant="danger" icon="trash" onClick={()=>deleteCampaign(deleteTarget)}>삭제</Btn>
        </div>
      </Modal>
    </div>
  );

/* Gemini API 호출 */
async function callGemini(apiKey, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.9, maxOutputTokens:2048}
    })
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'Gemini API 오류'); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function parseGeminiJSON(raw) {
  try {
    const m = raw.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : null;
  } catch { return null; }
}

  const upd = (k,v) => setForm(p=>({...p,[k]:v}));

  const generate = async () => {
    if (!apiKey) { setError('설정 페이지에서 Gemini API 키를 먼저 입력해주세요.'); return; }
    setLoading(true); setError(''); setResult(null);
    const prompt = `당신은 이메일 마케팅 전문가입니다. 아래 조건으로 한국어 이메일을 작성해주세요.

캠페인 목적: ${form.type}
대상 세그먼트: ${form.segment}
톤앤매너: ${form.tone}
핵심 메시지: ${form.notes || '(없음)'}

반드시 아래 JSON 형식만 응답하세요. 마크다운, 설명 텍스트 없이 JSON만:
{
  "subjects": ["제목안1", "제목안2", "제목안3"],
  "preheader": "프리헤더 텍스트 (30자 이내)",
  "heading": "이메일 메인 헤딩",
  "body": "이메일 본문 (3~4문장, {{이름}} 개인화 변수 포함)",
  "ctaText": "CTA 버튼 텍스트"
}`;
    try {
      const raw = await callGemini(apiKey, prompt);
      const parsed = parseGeminiJSON(raw);
      if (!parsed) throw new Error('응답 파싱 실패. 다시 시도해주세요.');
      setResult(parsed); setSelSubject(0);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const apply = () => {
    if (!result) return;
    onApply({
      subject:  result.subjects?.[selSubject] || '',
      preheader:result.preheader || '',
      heading:  result.heading   || '',
      body:     result.body      || '',
      ctaText:  result.ctaText   || '',
    });
    onClose();
  };

  const handleClose = () => { setResult(null); setError(''); onClose(); };

  return (
    <Modal open={open} onClose={handleClose} title="🤖 Gemini AI 이메일 생성" width={560}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {/* Form */}
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:'1 1 180px',display:'flex',flexDirection:'column',gap:6}}>
            <label style={{fontSize:13,color:C.textSec,fontWeight:500}}>캠페인 목적</label>
            <select value={form.type} onChange={e=>upd('type',e.target.value)}
              style={{padding:'9px 12px',borderRadius:R.md,border:`1px solid ${C.border}`,
                background:C.bg,color:C.text,fontSize:13,outline:'none',fontFamily:'inherit',cursor:'pointer'}}>
              {CAMPAIGN_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div style={{flex:'1 1 130px',display:'flex',flexDirection:'column',gap:6}}>
            <label style={{fontSize:13,color:C.textSec,fontWeight:500}}>대상 세그먼트</label>
            <select value={form.segment} onChange={e=>upd('segment',e.target.value)}
              style={{padding:'9px 12px',borderRadius:R.md,border:`1px solid ${C.border}`,
                background:C.bg,color:C.text,fontSize:13,outline:'none',fontFamily:'inherit',cursor:'pointer'}}>
              {['전체','VIP','신규고객','잠재고객'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div style={{flex:'1 1 130px',display:'flex',flexDirection:'column',gap:6}}>
            <label style={{fontSize:13,color:C.textSec,fontWeight:500}}>톤앤매너</label>
            <select value={form.tone} onChange={e=>upd('tone',e.target.value)}
              style={{padding:'9px 12px',borderRadius:R.md,border:`1px solid ${C.border}`,
                background:C.bg,color:C.text,fontSize:13,outline:'none',fontFamily:'inherit',cursor:'pointer'}}>
              {TONES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <label style={{fontSize:13,color:C.textSec,fontWeight:500}}>핵심 메시지 (선택)</label>
          <textarea value={form.notes} onChange={e=>upd('notes',e.target.value)}
            placeholder="예: 3월 한 달간 전 상품 20% 할인, 선착순 100명 한정..."
            rows={2} style={{padding:'10px 14px',borderRadius:R.md,border:`1px solid ${C.border}`,
              background:C.bg,color:C.text,fontSize:13,outline:'none',resize:'vertical',
              fontFamily:'inherit',lineHeight:1.6}}
            onFocus={e=>e.target.style.borderColor=C.accent}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>

        {error && (
          <div style={{padding:'10px 14px',borderRadius:R.md,background:`${C.danger}15`,
            border:`1px solid ${C.danger}30`,fontSize:13,color:C.danger}}>{error}</div>
        )}

        {/* Result */}
        {result && (
          <div style={{background:C.bg,borderRadius:R.lg,padding:16,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:C.success,marginBottom:12,
              display:'flex',alignItems:'center',gap:6}}>
              <Icon name="check" size={14}/> 생성 완료 — 제목을 선택하세요
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
              {(result.subjects||[]).map((s,i)=>(
                <div key={i} onClick={()=>setSelSubject(i)}
                  style={{padding:'9px 14px',borderRadius:R.md,cursor:'pointer',fontSize:13,
                    border:`1px solid ${selSubject===i?C.accent:C.border}`,
                    background:selSubject===i?C.accentGlow:C.surface,color:C.text,
                    display:'flex',alignItems:'center',gap:8,transition:'all 0.15s'}}>
                  <div style={{width:16,height:16,borderRadius:'50%',flexShrink:0,
                    border:`2px solid ${selSubject===i?C.accent:C.border}`,
                    background:selSubject===i?C.accent:'transparent'}}/>
                  {s}
                </div>
              ))}
            </div>
            {[['프리헤더',result.preheader],['헤딩',result.heading],['본문',result.body],['CTA',result.ctaText]].map(([l,v])=>(
              <div key={l} style={{marginBottom:6,fontSize:12}}>
                <span style={{color:C.textMut}}>{l}: </span>
                <span style={{color:C.textSec}}>{v}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
          <Btn variant="secondary" onClick={handleClose}>취소</Btn>
          {!result
            ? <Btn icon="bot" onClick={generate} disabled={loading}>
                {loading ? '생성 중...' : 'AI로 생성하기'}
              </Btn>
            : <>
                <Btn variant="secondary" icon="bot" onClick={generate} disabled={loading}>
                  {loading ? '...' : '재생성'}
                </Btn>
                <Btn icon="check" onClick={apply}>에디터에 적용</Btn>
              </>
          }
        </div>
      </div>
    </Modal>
  );
}

/* ---- Email Preview ---- */
function EmailPreview({ tmpl }) {
  const hi = (txt='') => txt.replace(/\{\{이름\}\}/g,'<span style="background:#A29BFE22;color:#A29BFE;padding:0 4px;border-radius:3px">{{이름}}</span>')
    .replace(/\{\{회사\}\}/g,'<span style="background:#00B89422;color:#00B894;padding:0 4px;border-radius:3px">{{회사}}</span>')
    .replace(/\n/g,'<br/>');
  return (
    <div style={{background:'#f0f2f5',borderRadius:R.xl,padding:28,minHeight:400}}>
      <div style={{maxWidth:460,margin:'0 auto',background:tmpl.bgColor||'#fff',
        borderRadius:R.lg,overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,0.12)'}}>
        <div style={{height:5,background:tmpl.accentColor||C.accent}}/>
        <div style={{padding:'28px 26px'}}>
          {tmpl.heading && (
            <h1 style={{fontSize:22,fontWeight:800,color:'#1a1a2e',margin:'0 0 14px',lineHeight:1.3}}
              dangerouslySetInnerHTML={{__html:hi(tmpl.heading)}}/>
          )}
          {tmpl.body && (
            <p style={{fontSize:14,color:'#555',lineHeight:1.8,margin:'0 0 24px',whiteSpace:'pre-wrap'}}
              dangerouslySetInnerHTML={{__html:hi(tmpl.body)}}/>
          )}
          {tmpl.ctaText && (
            <a href={tmpl.ctaUrl||'#'} target="_blank" style={{
              display:'inline-block',padding:'12px 28px',borderRadius:8,
              background:tmpl.accentColor||C.accent,color:'#fff',
              textDecoration:'none',fontWeight:700,fontSize:14}}>
              {tmpl.ctaText}
            </a>
          )}
        </div>
        <div style={{padding:'12px 26px',borderTop:'1px solid #eee',
          fontSize:11,color:'#aaa',textAlign:'center'}}>
          수신거부 · 개인정보처리방침
        </div>
      </div>
      {tmpl.subject && (
        <div style={{marginTop:12,padding:'8px 14px',borderRadius:R.md,
          background:'rgba(255,255,255,0.06)',fontSize:12,color:C.textSec,textAlign:'center'}}>
          <b style={{color:C.textSec}}>제목:</b> {tmpl.subject}
          {tmpl.preheader && <span style={{marginLeft:8,color:C.textMut}}>· {tmpl.preheader}</span>}
        </div>
      )}
    </div>
  );
}

/* ---- Template Editor ---- */
function TemplateEditor({ template, onBack, onSave }) {
  const {state, toast} = useApp();
  const apiKey = state.settings?.geminiApiKey || '';
  const blankTmpl = {name:'',category:'프로모션',subject:'',preheader:'',heading:'',
    body:'',ctaText:'자세히 보기',ctaUrl:'https://',bgColor:'#ffffff',accentColor:C.accent};
  const [form, setForm]       = useState(template ? {...blankTmpl,...template} : blankTmpl);
  const [showAI, setShowAI]   = useState(false);
  const bodyRef = useRef(null);
  const upd = (k,v) => setForm(p=>({...p,[k]:v}));

  const insertVar = (v) => {
    const el = bodyRef.current;
    if (!el) { upd('body', form.body + v); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    const next = form.body.slice(0,s) + v + form.body.slice(e);
    upd('body', next);
    setTimeout(()=>{ el.focus(); el.setSelectionRange(s+v.length, s+v.length); }, 0);
  };

  const applyAI = (ai) => {
    setForm(p=>({...p,
      subject:  ai.subject  || p.subject,
      preheader:ai.preheader|| p.preheader,
      heading:  ai.heading  || p.heading,
      body:     ai.body     || p.body,
      ctaText:  ai.ctaText  || p.ctaText,
    }));
    toast('AI 생성 내용이 에디터에 적용되었습니다 ✨');
  };

  const handleSave = () => {
    if (!form.name.trim()) { toast('템플릿 이름을 입력해주세요','warning'); return; }
    onSave({...form, id: template?.id || 't_'+Date.now(),
      createdAt: template?.createdAt || new Date().toISOString().slice(0,10)});
  };

  const LBL = {fontSize:12,color:C.textSec,fontWeight:600,marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.5px'};
  const INP = {width:'100%',padding:'9px 12px',borderRadius:R.md,border:`1px solid ${C.border}`,
    background:C.bg,color:C.text,fontSize:13,outline:'none',boxSizing:'border-box',fontFamily:'inherit'};

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <Btn variant="ghost" icon="chevronLeft" onClick={onBack}>목록으로</Btn>
          <div>
            <h1 style={{fontSize:22,fontWeight:800,color:C.text,margin:0}}>
              {template ? '템플릿 편집' : '새 템플릿'}
            </h1>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="secondary" icon="bot" onClick={()=>setShowAI(true)}>AI로 생성</Btn>
          <Btn icon="check" onClick={handleSave}>저장</Btn>
        </div>
      </div>

      <div style={{display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-start'}}>
        {/* Editor Panel */}
        <div style={{flex:'1 1 320px',background:C.card,borderRadius:R.xl,
          border:`1px solid ${C.border}`,padding:22,display:'flex',flexDirection:'column',gap:14}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.textSec,
            textTransform:'uppercase',letterSpacing:'0.5px'}}>편집 패널</h3>

          {/* Name & Category */}
          <div style={{display:'flex',gap:10}}>
            <div style={{flex:2}}>
              <label style={LBL}>템플릿 이름 *</label>
              <input value={form.name} onChange={e=>upd('name',e.target.value)}
                placeholder="예: 3월 프로모션" style={INP}
                onFocus={e=>e.target.style.borderColor=C.accent}
                onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
            <div style={{flex:1}}>
              <label style={LBL}>카테고리</label>
              <select value={form.category} onChange={e=>upd('category',e.target.value)}
                style={{...INP,cursor:'pointer'}}>
                {TMPL_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>

          {/* Subject */}
          <div>
            <label style={LBL}>제목줄 (Subject)</label>
            <input value={form.subject} onChange={e=>upd('subject',e.target.value)}
              placeholder="[할인] 이번 주말 특별 프로모션을 안내드립니다" style={INP}
              onFocus={e=>e.target.style.borderColor=C.accent}
              onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>

          {/* Preheader */}
          <div>
            <label style={LBL}>프리헤더 <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:C.textMut}}>(받은편지함에 제목 옆 표시)</span></label>
            <input value={form.preheader} onChange={e=>upd('preheader',e.target.value)}
              placeholder="이번 기회를 놓치지 마세요 🎁" style={INP}
              onFocus={e=>e.target.style.borderColor=C.accent}
              onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>

          {/* Heading */}
          <div>
            <label style={LBL}>메인 헤딩</label>
            <input value={form.heading} onChange={e=>upd('heading',e.target.value)}
              placeholder="{{이름}}님, 특별한 혜택을 드립니다" style={INP}
              onFocus={e=>e.target.style.borderColor=C.accent}
              onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>

          {/* Body */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
              <label style={{...LBL,marginBottom:0}}>본문</label>
              <div style={{display:'flex',gap:4}}>
                {PVARS.map(v=>(
                  <button key={v} onClick={()=>insertVar(v)} style={{
                    padding:'2px 7px',borderRadius:4,border:`1px solid ${C.border}`,
                    background:C.surfaceHov,color:C.accentL,fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>
                    {v}
                  </button>
                ))}
              </div>
            </div>
            <textarea ref={bodyRef} value={form.body} onChange={e=>upd('body',e.target.value)} rows={5}
              placeholder="안녕하세요 {{이름}}님,&#10;&#10;본문 내용을 입력하세요..."
              style={{...INP,resize:'vertical',lineHeight:1.7}}
              onFocus={e=>e.target.style.borderColor=C.accent}
              onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>

          {/* CTA */}
          <div style={{display:'flex',gap:10}}>
            <div style={{flex:1}}>
              <label style={LBL}>CTA 버튼 텍스트</label>
              <input value={form.ctaText} onChange={e=>upd('ctaText',e.target.value)}
                placeholder="자세히 보기" style={INP}
                onFocus={e=>e.target.style.borderColor=C.accent}
                onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
            <div style={{flex:1.5}}>
              <label style={LBL}>CTA 링크 URL</label>
              <input value={form.ctaUrl} onChange={e=>upd('ctaUrl',e.target.value)}
                placeholder="https://example.com" style={INP}
                onFocus={e=>e.target.style.borderColor=C.accent}
                onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
          </div>

          {/* Colors */}
          <div style={{display:'flex',gap:10}}>
            {[['bgColor','배경색'],['accentColor','강조색']].map(([k,l])=>(
              <div key={k} style={{flex:1,display:'flex',flexDirection:'column',gap:5}}>
                <label style={LBL}>{l}</label>
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',
                  borderRadius:R.md,border:`1px solid ${C.border}`,background:C.bg}}>
                  <input type="color" value={form[k]} onChange={e=>upd(k,e.target.value)}
                    style={{width:28,height:28,border:'none',borderRadius:5,cursor:'pointer',
                      background:'none',padding:0}}/>
                  <span style={{fontSize:12,color:C.textSec,fontFamily:'monospace'}}>{form[k]}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Preview Panel */}
        <div style={{flex:'1 1 320px',display:'flex',flexDirection:'column',gap:10}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.textSec,
            textTransform:'uppercase',letterSpacing:'0.5px'}}>실시간 미리보기</h3>
          <EmailPreview tmpl={form}/>
        </div>
      </div>

      <AIGenerateModal open={showAI} onClose={()=>setShowAI(false)} onApply={applyAI} apiKey={apiKey}/>
    </div>
  );
}

/* ---- Templates List ---- */
function TemplatesPage() {
  const {state, dispatch, toast} = useApp();
  const templates = state.templates;
  const [editing, setEditing] = useState(null);   // null=list, object=editor
  const [isNew,   setIsNew]   = useState(false);
  const [filterCat, setFilterCat] = useState('전체');
  const [deleteTarget, setDeleteTarget] = useState(null);

  const filtered = filterCat==='전체' ? templates : templates.filter(t=>t.category===filterCat);

  const openNew  = () => { setEditing(null); setIsNew(true); };
  const openEdit = (t) => { setEditing(t);   setIsNew(false); };
  const backToList = () => { setEditing(null); setIsNew(false); };

  const saveTemplate = (form) => {
    if (isNew) {
      dispatch({type:'SET_TEMPLATES', data:[form,...templates]});
      toast('템플릿이 저장되었습니다');
    } else {
      dispatch({type:'SET_TEMPLATES', data:templates.map(t=>t.id===form.id?form:t)});
      toast('템플릿이 수정되었습니다');
    }
    backToList();
  };

  const duplicateTmpl = (t) => {
    const copy = {...t, id:'t_'+Date.now(), name:t.name+' (복사)',
      createdAt:new Date().toISOString().slice(0,10)};
    dispatch({type:'SET_TEMPLATES', data:[copy,...templates]});
    toast('템플릿이 복제되었습니다');
  };

  const deleteTmpl = (id) => {
    dispatch({type:'SET_TEMPLATES', data:templates.filter(t=>t.id!==id)});
    setDeleteTarget(null); toast('삭제되었습니다','info');
  };

  const CAT_COLORS = {프로모션:'orange', 뉴스레터:'blue', 자동화:'green', 공지:'gray'};

  // Editor view
  if (editing !== null || isNew) {
    return <TemplateEditor template={isNew?null:editing} onBack={backToList} onSave={saveTemplate}/>;
  }

  // List view
  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:26,fontWeight:800,color:C.text,margin:0}}>이메일 템플릿</h1>
          <p style={{color:C.textSec,margin:'4px 0 0',fontSize:13}}>
            총 <b style={{color:C.text}}>{templates.length}</b>개 템플릿
          </p>
        </div>
        <Btn icon="plus" onClick={openNew}>새 템플릿</Btn>
      </div>

      {/* Category Filter */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['전체',...TMPL_CATEGORIES].map(cat=>(
          <button key={cat} onClick={()=>setFilterCat(cat)} style={{
            padding:'7px 16px',borderRadius:R.md,border:`1px solid ${filterCat===cat?C.accent:C.border}`,
            cursor:'pointer',fontSize:13,fontWeight:filterCat===cat?700:400,transition:'all 0.18s',
            background:filterCat===cat?C.accentGlow:C.card,color:filterCat===cat?C.accentL:C.textSec}}>
            {cat}
          </button>
        ))}
      </div>

      {/* Grid */}
      {filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'64px 0',color:C.textMut}}>
          <div style={{fontSize:40,marginBottom:12}}>📭</div>
          <div style={{fontSize:15,marginBottom:8,color:C.textSec}}>템플릿이 없습니다</div>
          <Btn icon="plus" onClick={openNew}>첫 템플릿 만들기</Btn>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
          {filtered.map(t=>(
            <div key={t.id} style={{background:C.card,borderRadius:R.xl,border:`1px solid ${C.border}`,
              overflow:'hidden',transition:'transform 0.18s,border-color 0.18s',cursor:'pointer'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=`${C.accent}60`;e.currentTarget.style.transform='translateY(-2px)';}}

/* ── 자동화 시퀀스 엔진 ─────────────────────────────────── */
// 자동화 데이터 모델
// automation: { id, name, status:'active'|'paused'|'draft', trigger:{type,campaignId},
//   steps:[{id,type:'wait'|'send'|'condition', ...}], stats:{enrolled,completed,active},
//   createdAt, logs:[] }
// step types:
//   wait   → { delay:number, unit:'hours'|'days' }
//   send   → { templateId, subject }
//   condition → { check:'opened'|'clicked', yesLabel, noLabel }

/* 자동화 실행 엔진 (localStorage 기반 시뮬레이션) */
const AUTO_RUN_KEY = 'mf_autorun'; // { autoId, contactId, stepIdx, enrolledAt, nextRunAt, history:[] }

function runAutomationEngine(automations, contacts, templates, settings) {
  const now = Date.now();
  const runs = store.get(AUTO_RUN_KEY, []);
  const logs = [];

  runs.forEach(run => {
    if (run.nextRunAt && run.nextRunAt > now) return;
    const auto = automations.find(a=>a.id===run.autoId);
    if (!auto || auto.status !== 'active') return;
    const contact = contacts.find(c=>c.id===run.contactId);
    if (!contact) return;
    const step = auto.steps[run.stepIdx];
    if (!step) { run.done = true; return; }

    if (step.type === 'send') {
      const tmpl = templates.find(t=>t.id===step.templateId);
      logs.push({ autoId:auto.id, contactId:contact.id, contactName:contact.name,
        stepIdx:run.stepIdx, type:'send', templateName:tmpl?.name||'?',
        at: new Date().toISOString() });
      run.history = [...(run.history||[]), { stepIdx:run.stepIdx, type:'send', at:now }];
      run.stepIdx++;
      run.nextRunAt = null;
    } else if (step.type === 'wait') {
      const ms = step.delay * (step.unit==='days' ? 86400000 : 3600000);
      run.nextRunAt = now + ms;
      run.stepIdx++;
    } else if (step.type === 'condition') {
      // 시뮬레이션: 오픈율 기반 랜덤 분기 (실제론 Brevo webhook 연동)
      const opened = Math.random() > 0.4;
      run.history = [...(run.history||[]), { stepIdx:run.stepIdx, type:'condition', result:opened?'yes':'no', at:now }];
      logs.push({ autoId:auto.id, contactId:contact.id, contactName:contact.name,
        stepIdx:run.stepIdx, type:'condition', result:opened?'YES':'NO', at:new Date().toISOString() });
      run.stepIdx = opened ? run.stepIdx+1 : run.stepIdx+2; // 분기: +1=yes, +2=no(skip)
      run.nextRunAt = null;
    }
  });

  store.set(AUTO_RUN_KEY, runs.filter(r=>!r.done));
  return logs;
}

function enrollContacts(autoId, segContacts) {
  const runs = store.get(AUTO_RUN_KEY, []);
  const existing = new Set(runs.filter(r=>r.autoId===autoId).map(r=>r.contactId));
  const newRuns = segContacts
    .filter(c=>!existing.has(c.id))
    .map(c=>({ autoId, contactId:c.id, stepIdx:0, enrolledAt:Date.now(), nextRunAt:null, history:[], done:false }));
  store.set(AUTO_RUN_KEY, [...runs, ...newRuns]);
  return newRuns.length;
}

/* ── Step Node 컴포넌트 ── */
function StepNode({ step, idx, total, onChange, onDelete }) {
  const STEP_COLORS = { send:C.accent, wait:C.warning, condition:'#00CEC9' };
  const col = STEP_COLORS[step.type] || C.textSec;

  return (
    <div style={{position:'relative'}}>
      {/* 연결선 */}
      {idx > 0 && (
        <div style={{width:2,height:20,background:C.border,margin:'0 auto'}}/>
      )}
      <div style={{border:`2px solid ${col}`,borderRadius:12,padding:'14px 16px',
        background:`${col}11`,position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <div style={{width:28,height:28,borderRadius:7,background:col,display:'flex',alignItems:'center',
            justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700}}>{idx+1}</div>
          <span style={{fontSize:12,fontWeight:700,color:col,textTransform:'uppercase',letterSpacing:'0.5px'}}>
            {step.type==='send'?'📧 이메일 발송':step.type==='wait'?'⏰ 대기':' 조건 분기'}
          </span>
          <button onClick={()=>onDelete(idx)}
            style={{marginLeft:'auto',background:'transparent',border:'none',cursor:'pointer',
              color:'#FF6363',fontSize:18,padding:'0 4px',lineHeight:1}}>×</button>
        </div>
        <StepEditor step={step} onChange={v=>onChange(idx,v)}/>
      </div>
      {/* 조건 분기 라벨 */}
      {step.type==='condition' && idx<total-1 && (
        <div style={{display:'flex',justifyContent:'space-around',marginTop:4}}>
          <span style={{fontSize:11,color:C.success,fontWeight:600}}>✓ YES → 다음 단계</span>
          <span style={{fontSize:11,color:'#FF6363',fontWeight:600}}>✗ NO → 건너뜀</span>
        </div>
      )}
    </div>
  );
}

function StepEditor({ step, onChange }) {
  const { state } = useApp();
  const templates = state.templates || [];
  const upd = (k,v) => onChange({ ...step, [k]:v });

  if (step.type === 'send') return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <Select value={step.templateId||''} onChange={e=>upd('templateId',e.target.value)} style={{width:'100%'}}>
        <option value="">-- 템플릿 선택 --</option>
        {templates.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
      </Select>
      <Input value={step.subject||''} onChange={e=>upd('subject',e.target.value)}
        placeholder="제목 (비워두면 템플릿 제목 사용)" style={{marginBottom:0}}/>
    </div>
  );

  if (step.type === 'wait') return (
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <input type="number" min={1} max={365} value={step.delay||1} onChange={e=>upd('delay',+e.target.value)}
        style={{width:70,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:7,
          padding:'8px 10px',color:C.text,fontSize:14,textAlign:'center'}}/>
      <Select value={step.unit||'days'} onChange={e=>upd('unit',e.target.value)} style={{flex:1}}>
        <option value="hours">시간 후</option>
        <option value="days">일 후</option>
      </Select>
    </div>
  );

  if (step.type === 'condition') return (
    <div>
      <Select value={step.check||'opened'} onChange={e=>upd('check',e.target.value)} style={{width:'100%'}}>
        <option value="opened">이메일 오픈 여부</option>
        <option value="clicked">링크 클릭 여부</option>
      </Select>
      <p style={{margin:'8px 0 0',fontSize:11,color:C.textSec}}>
        YES → 다음 스텝 진행 / NO → 다음 스텝 건너뜀
      </p>
    </div>
  );

  return null;
}

/* ── Automation Editor Modal ── */
function AutomationEditor({ open, automation, onClose, onSave }) {
  const { state } = useApp();
  const contacts = state.contacts || [];

  const blank = { name:'', trigger:{ type:'campaign_sent', campaignId:'' }, steps:[], status:'draft' };
  const [form, setForm] = useState(blank);

  useEffect(() => {
    if (open) setForm(automation ? {...blank,...automation, steps:[...((automation.steps)||[])]} : blank);
  }, [open, automation]);

  const addStep = (type) => {
    const defaults = {
      send: { type:'send', id:`s${Date.now()}`, templateId:'', subject:'' },
      wait: { type:'wait', id:`w${Date.now()}`, delay:3, unit:'days' },
      condition: { type:'condition', id:`c${Date.now()}`, check:'opened' },
    };
    setForm(p=>({...p, steps:[...p.steps, defaults[type]]}));
  };

  const updateStep = (idx, val) => setForm(p=>({...p, steps:p.steps.map((s,i)=>i===idx?val:s)}));
  const deleteStep = (idx) => setForm(p=>({...p, steps:p.steps.filter((_,i)=>i!==idx)}));

  const segCnt = filterBySegment(contacts, { type:'all' }).length;
  const valid  = form.name.trim() && form.steps.length > 0;

  const handleSave = () => {
    const now = new Date().toISOString();
    onSave({
      ...form, name:form.name.trim(),
      id: automation?.id || `auto_${Date.now()}`,
      createdAt: automation?.createdAt || now,
      stats: automation?.stats || { enrolled:0, completed:0, active:0 },
      logs: automation?.logs || [],

  };

  return (
    <Modal open={open} onClose={onClose} title={automation?'자동화 수정':'새 자동화 플로우'} width={700}>

            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:6}}>플로우 이름 *</label>
            <Input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="예: 신규 고객 웰컴 시퀀스"/>
          </div>
          <div>
            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:6}}>트리거</label>
            <Select value={form.trigger.type} onChange={e=>setForm(p=>({...p,trigger:{...p.trigger,type:e.target.value}}))} style={{width:'100%'}}>
              <option value="campaign_sent">캠페인 발송 후</option>
              <option value="contact_added">수신자 추가 시</option>
              <option value="manual">수동 실행</option>
            </Select>
          </div>
        </div>
        {form.trigger.type === 'campaign_sent' && (
          <div>
            <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:6}}>트리거 캠페인</label>
            <Select value={form.trigger.campaignId||''} onChange={e=>setForm(p=>({...p,trigger:{...p.trigger,campaignId:e.target.value}}))} style={{width:'100%'}}>
              <option value="">-- 캠페인 선택 (선택사항) --</option>
              {campaigns.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </Select>
          </div>
        )}

        {/* 스텝 빌더 */}
        <div>
          <label style={{display:'block',fontSize:12,color:C.textSec,marginBottom:10}}>
            자동화 스텝 <span style={{color:C.textSec,fontWeight:400}}>({form.steps.length}개)</span>
          </label>
          <div style={{maxHeight:340,overflowY:'auto',paddingRight:4}}>
            {form.steps.length === 0 && (
              <div style={{textAlign:'center',padding:'28px',border:`2px dashed ${C.border}`,borderRadius:10,color:C.textSec,fontSize:13}}>
                아래 버튼으로 스텝을 추가하세요
              </div>
            )}
            {form.steps.map((step,i)=>(
              <StepNode key={step.id} step={step} idx={i} total={form.steps.length}
                onChange={updateStep} onDelete={deleteStep}/>
            ))}
          </div>
          {/* 스텝 추가 버튼 */}
          <div style={{display:'flex',gap:8,marginTop:12}}>
            {[
              { type:'send', label:'📧 이메일 발송', color:C.accent },
              { type:'wait', label:'⏰ 대기', color:C.warning },
              { type:'condition', label:' 조건 분기', color:'#00CEC9' },
            ].map(({type,label,color})=>(
              <button key={type} onClick={()=>addStep(type)}
                style={{flex:1,padding:'9px 12px',borderRadius:8,border:`1.5px dashed ${color}`,
                  background:`${color}11`,color,cursor:'pointer',fontSize:12,fontWeight:600}}>
                + {label}

            ))}

        </div>
      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
        <Btn variant="secondary" onClick={onClose}>취소</Btn>
        <Btn variant="primary" icon="save" onClick={handleSave} disabled={!valid}>저장</Btn>
      </div>
    </Modal>

  const [showLog,    setShowLog]    = useState(false);
  const [logTarget,  setLogTarget]  = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [lastRun,    setLastRun]    = useState(null);

  const automations = state.automations || [];
  const contacts    = state.contacts    || [];
  const templates   = state.templates   || [];

  // 엔진 수동 실행 (페이지 로드 시)
  useEffect(() => {
    if (automations.length === 0) return;
    const logs = runAutomationEngine(automations, contacts, templates, state.settings||{});
    if (logs.length > 0) {
      // 로그를 각 자동화에 저장
      const next = automations.map(a => {
        const aLogs = logs.filter(l=>l.autoId===a.id);
        if (!aLogs.length) return a;
        return { ...a, logs:[...(a.logs||[]), ...aLogs] };
      });
      dispatch({ type:'SET_AUTOMATIONS', data:next });
      setLastRun(new Date().toLocaleTimeString('ko-KR'));
    }
  }, []); // 마운트 시 1회

  const saveAutomation = (obj) => {
    const existing = automations.find(a=>a.id===obj.id);
    const next = existing ? automations.map(a=>a.id===obj.id?obj:a) : [...automations, obj];
    dispatch({ type:'SET_AUTOMATIONS', data:next });
    setShowEditor(false); setEditAuto(null);
    toast(`자동화 "${obj.name}" 저장됨`);

    dispatch({ type:'SET_AUTOMATIONS', data:automations.filter(a=>a.id!==id) });

    toast('자동화 삭제됨');

      : a);
    dispatch({ type:'SET_AUTOMATIONS', data:next });
    toast(`"${auto.name}" ${auto.status==='active'?'일시정지':'재개'}됨`);

    // 활성화
    const next = automations.map(a=>a.id===auto.id
      ? {...a, status:'active', stats:{...(a.stats||{}), enrolled:(a.stats?.enrolled||0)+count, active:(a.stats?.active||0)+count }}
      : a);
    dispatch({ type:'SET_AUTOMATIONS', data:next });
    setShowRun(false); setRunTarget(null);
    toast(`${count}명 자동화 등록 완료`);
  };

  const totalEnrolled  = automations.reduce((s,a)=>s+(a.stats?.enrolled||0),0);
  const activeFlows    = automations.filter(a=>a.status==='active').length;

          <p style={{margin:'4px 0 0',fontSize:13,color:C.textSec}}>
            이메일 시퀀스를 자동화합니다
            {lastRun && <span style={{marginLeft:10,color:C.success,fontSize:11}}>✓ 엔진 실행: {lastRun}</span>}
          </p>
        </div>
        <Btn variant="primary" icon="plus" onClick={()=>{setEditAuto(null);setShowEditor(true);}}>새 자동화</Btn>
      </div>

      {/* 통계 카드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
        {[
          { label:'전체 플로우', value:automations.length, icon:'automation', color:C.accent },
          { label:'실행 중',     value:activeFlows,          icon:'check',     color:C.success },
          { label:'등록 수신자', value:totalEnrolled,        icon:'contacts',  color:C.warning },
          { label:'실행 로그',   value:totalLogs,            icon:'analytics', color:'#00CEC9' },
        ].map(s=>(
          <div key={s.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px 20px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div style={{width:34,height:34,borderRadius:8,background:`${s.color}22`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={s.icon} size={16} color={s.color}/>
              </div>
              <span style={{fontSize:12,color:C.textSec}}>{s.label}</span>
            </div>
            <div style={{fontSize:26,fontWeight:700,color:s.color}}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Make 연동 안내 배너 */}
      <div style={{background:`${C.warning}11`,border:`1px solid ${C.warning}44`,borderRadius:10,
        padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:20}}>🔗</span>
        <div style={{flex:1}}>
          <span style={{fontSize:13,fontWeight:600,color:C.warning}}>Make (Integromat) 웹훅 연동</span>
          <span style={{fontSize:12,color:C.textSec,marginLeft:8}}>
            실시간 이메일 오픈·클릭 이벤트는 Brevo → Make 웹훅 → 자동 실행으로 연동 가능합니다.
          </span>

                    <button onClick={()=>{setEditAuto(auto);setShowEditor(true);}}

/* ── 순수 SVG 바 차트 ── */
function BarChart({ data, width=460, height=180, color=C.accent, valueFormat }) {
  if (!data || data.length === 0) return null;
  const pad = { top:16, right:12, bottom:40, left:44 };
  const iW  = width  - pad.left - pad.right;
  const iH  = height - pad.top  - pad.bottom;
  const max = Math.max(...data.map(d=>d.value), 1);
  const barW = Math.max(4, (iW / data.length) * 0.6);
  const fmt = valueFormat || (v => v);
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:'visible'}}>
      {[0,0.25,0.5,0.75,1].map(r=>{
        const y = pad.top + iH*(1-r);
        return (
          <g key={r}>
            <line x1={pad.left} y1={y} x2={pad.left+iW} y2={y} stroke={C.border} strokeWidth={1} strokeDasharray={r===0?'none':'3,3'}/>
            <text x={pad.left-6} y={y+4} textAnchor="end" fontSize={10} fill={C.textSec}>{fmt(Math.round(max*r))}</text>
          </g>
        );
      })}
      {data.map((d,i)=>{
        const x    = pad.left + (iW/data.length)*i + (iW/data.length)*0.2;
        const barH = Math.max(2,(d.value/max)*iH);
        const y    = pad.top + iH - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx={3} fill={d.color||color} opacity={0.85}/>
            {barH > 18 && <text x={x+barW/2} y={y+barH-6} textAnchor="middle" fontSize={10} fill="#fff" fontWeight="600">{fmt(d.value)}</text>}
            <text x={x+barW/2} y={pad.top+iH+16} textAnchor="middle" fontSize={10} fill={C.textSec}>
              {d.label.length>6?d.label.slice(0,5)+'…':d.label}
            </text>
          </g>
        );
      })}
      <line x1={pad.left} y1={pad.top+iH} x2={pad.left+iW} y2={pad.top+iH} stroke={C.border} strokeWidth={1}/>
    </svg>
  );
}

/* ── 순수 SVG 라인 차트 ── */
function LineChart({ data, width=460, height=160, color=C.accent, fillColor, valueFormat }) {
  if (!data || data.length < 2) return null;
  const pad = { top:12, right:16, bottom:36, left:44 };
  const iW  = width  - pad.left - pad.right;
  const iH  = height - pad.top  - pad.bottom;
  const max = Math.max(...data.map(d=>d.value), 1);
  const fmt = valueFormat || (v=>v);
  const pts = data.map((d,i)=>({
    x: pad.left + (i/(data.length-1))*iW,
    y: pad.top  + iH - (d.value/max)*iH,
    ...d
  }));
  const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const fillPath = `M${pts[0].x},${pad.top+iH} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${pad.top+iH} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:'visible'}}>
      {[0,0.5,1].map(r=>{
        const y = pad.top+iH*(1-r);
        return (
          <g key={r}>
            <line x1={pad.left} y1={y} x2={pad.left+iW} y2={y} stroke={C.border} strokeWidth={1} strokeDasharray={r===0?'none':'3,3'}/>
            <text x={pad.left-6} y={y+4} textAnchor="end" fontSize={10} fill={C.textSec}>{fmt(Math.round(max*r))}</text>
          </g>
        );
      })}
      {fillColor && <path d={fillPath} fill={fillColor} opacity={0.12}/>}
      <polyline points={polyline} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={4} fill={color} stroke={C.surface} strokeWidth={2}/>
          <text x={p.x} y={pad.top+iH+16} textAnchor="middle" fontSize={9} fill={C.textSec}>{p.label}</text>
        </g>
      ))}
      <line x1={pad.left} y1={pad.top+iH} x2={pad.left+iW} y2={pad.top+iH} stroke={C.border} strokeWidth={1}/>
    </svg>
  );
}

/* ── 도넛 차트 ── */
function DonutChart({ value, max=100, color=C.accent, size=100, label, sublabel }) {
  const r=36, circ=2*Math.PI*r;
  const dash = circ*Math.min(value/max,1);
  return (
    <div style={{textAlign:'center'}}>
      <svg width={size} height={size} viewBox="0 0 90 90">
        <circle cx={45} cy={45} r={r} fill="none" stroke={C.border} strokeWidth={10}/>
        <circle cx={45} cy={45} r={r} fill="none" stroke={color} strokeWidth={10}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 45 45)" style={{transition:'stroke-dasharray 0.6s ease'}}/>
        <text x={45} y={42} textAnchor="middle" fontSize={14} fontWeight="700" fill={C.text}>{value}%</text>
        {sublabel && <text x={45} y={56} textAnchor="middle" fontSize={9} fill={C.textSec}>{sublabel}</text>}
      </svg>
      {label && <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{label}</div>}
    </div>
  );
}

/* ── 히트맵 (시간대×요일) ── */
function HeatMap({ data }) {
  const hours=[...Array(24).keys()], days=['월','화','수','목','금','토','일'];
  const maxVal=Math.max(...data.flat(),1);
  const cellW=28, cellH=22;
  return (
    <div style={{overflowX:'auto'}}>
      <div style={{display:'inline-flex',flexDirection:'column',gap:2}}>
        <div style={{display:'flex',gap:2,marginLeft:28}}>
          {hours.map(h=>(
            <div key={h} style={{width:cellW,textAlign:'center',fontSize:9,color:C.textSec}}>
              {h%4===0?`${h}시`:''}
            </div>
          ))}
        </div>
        {days.map((day,di)=>(
          <div key={day} style={{display:'flex',gap:2,alignItems:'center'}}>
            <div style={{width:24,fontSize:11,color:C.textSec,textAlign:'right',marginRight:4}}>{day}</div>
            {hours.map(h=>{
              const v=data[di]?.[h]||0, intensity=v/maxVal;
              const bg=intensity===0?C.surface2:`rgba(108,92,231,${0.15+intensity*0.85})`;
              return (
                <div key={h} title={`${day} ${h}시: ${v}건`}
                  style={{width:cellW,height:cellH,borderRadius:3,background:bg,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:9,color:intensity>0.5?'#fff':C.textSec,cursor:'default'}}>
                  {v>0?v:''}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── 데이터 계산 유틸 ── */
function calcCampaignStats(campaigns) {
  const sent=campaigns.filter(c=>c.status==='sent');
  const totalRecipients=sent.reduce((s,c)=>s+(c.recipients||0),0);
  const totalOpens=sent.reduce((s,c)=>s+(c.openCount||0),0);
  const totalClicks=sent.reduce((s,c)=>s+(c.clickCount||0),0);
  return {
    sent: sent.length, totalRecipients, totalOpens, totalClicks,
    avgOpenRate:  totalRecipients>0?Math.round(totalOpens/totalRecipients*100):0,
    avgClickRate: totalRecipients>0?Math.round(totalClicks/totalRecipients*100):0,
    avgCTOR:      totalOpens>0?Math.round(totalClicks/totalOpens*100):0,
  };
}

function genHeatmapData(campaigns) {
  const grid=Array.from({length:7},()=>Array(24).fill(0));
  campaigns.filter(c=>c.status==='sent'&&c.sentAt).forEach(c=>{
    const d=new Date(c.sentAt);
    const dow=(d.getDay()+6)%7, hour=d.getHours(), opens=c.openCount||0;
    [0.4,0.3,0.2,0.1].forEach((w,h)=>{ grid[dow][(hour+h)%24]+=Math.round(opens*w); });
  });
  return grid;
}

function exportAnalyticsCSV(campaigns) {
  const header=['캠페인명','상태','발송일','수신자','오픈수','클릭수','오픈율(%)','클릭율(%)','CTOR(%)'];
  const rows=campaigns.filter(c=>c.status==='sent').map(c=>{
    const or=c.recipients>0?Math.round((c.openCount||0)/c.recipients*100):0;
    const cr=c.recipients>0?Math.round((c.clickCount||0)/c.recipients*100):0;
    const ct=c.openCount>0?Math.round((c.clickCount||0)/(c.openCount||1)*100):0;
    return [c.name,c.status,c.sentAt||'',c.recipients||0,c.openCount||0,c.clickCount||0,or,cr,ct];
  });
  const csv=[header,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  Object.assign(document.createElement('a'),{href:url,download:'mailflow-analytics.csv'}).click();
  URL.revokeObjectURL(url);
}

/* ── Analytics Page ── */
function AnalyticsPage() {
  const { state } = useApp();
  const [period, setPeriod]     = useState('all');
  const [sortKey, setSortKey]   = useState('sentAt');
  const [sortDir, setSortDir]   = useState('desc');
  const [showDetail, setShowDetail] = useState(null);

  const allCampaigns = state.campaigns || [];
  const now = Date.now();

  const filtered = allCampaigns.filter(c=>{
    if (period==='all') return true;
    if (!c.sentAt) return false;
    return (now - new Date(c.sentAt).getTime()) <= parseInt(period)*86400000;
  });

  const stats = calcCampaignStats(filtered);
  const sentCampaigns = filtered.filter(c=>c.status==='sent');

  const sorted = [...sentCampaigns].sort((a,b)=>{
    let va=a[sortKey]||0, vb=b[sortKey]||0;
    if (sortKey==='openRate')  { va=a.recipients>0?(a.openCount||0)/a.recipients:0; vb=b.recipients>0?(b.openCount||0)/b.recipients:0; }
    if (sortKey==='clickRate') { va=a.recipients>0?(a.clickCount||0)/a.recipients:0; vb=b.recipients>0?(b.clickCount||0)/b.recipients:0; }
    return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  });

  const toggleSort = (key) => {
    if (sortKey===key) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const barData = sentCampaigns.slice(-6).map(c=>({
    label: c.name.length>8?c.name.slice(0,7)+'…':c.name,
    value: c.recipients>0?Math.round((c.openCount||0)/c.recipients*100):0,
  }));

  const monthlyMap = {};
  sentCampaigns.forEach(c=>{
    if (!c.sentAt) return;
    const mo=c.sentAt.slice(0,7);
    if (!monthlyMap[mo]) monthlyMap[mo]={opens:0,recipients:0};
    monthlyMap[mo].opens+=c.openCount||0;
    monthlyMap[mo].recipients+=c.recipients||0;
  });
  const monthlyData = Object.entries(monthlyMap).sort().slice(-6).map(([mo,v])=>({
    label: mo.slice(5)+'월',
    value: v.recipients>0?Math.round(v.opens/v.recipients*100):0,
  }));

  const heatmapData = genHeatmapData(allCampaigns);

  const kpiCards = [
    { label:'총 발송 캠페인', value:stats.sent,                        sub:`전체 ${allCampaigns.length}개 중`, color:C.accent,  icon:'campaigns' },
    { label:'총 수신자',      value:stats.totalRecipients.toLocaleString(), sub:'발송 완료 기준',             color:'#00CEC9', icon:'contacts'  },
    { label:'평균 오픈율',    value:`${stats.avgOpenRate}%`,            sub:'업계 평균 21.5%',               color:C.success, icon:'check',     trend:stats.avgOpenRate>=21.5?'up':'down' },
    { label:'평균 클릭율',    value:`${stats.avgClickRate}%`,           sub:'업계 평균 2.6%',                color:C.warning, icon:'analytics', trend:stats.avgClickRate>=2.6?'up':'down' },
  ];

  const SortIcon = ({k}) => (
    <span style={{marginLeft:4,opacity:sortKey===k?1:0.3,fontSize:10}}>
      {sortKey===k?(sortDir==='asc'?'▲':'▼'):'▼'}
    </span>
  );

  return (
    <div style={{padding:'24px 28px',minHeight:'100%'}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,color:C.text}}>성과 분석</h1>
          <p style={{margin:'4px 0 0',fontSize:13,color:C.textSec}}>캠페인 오픈율·클릭율·트렌드를 분석합니다</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{display:'flex',gap:4}}>
            {[['all','전체'],['30','30일'],['7','7일']].map(([v,l])=>(
              <button key={v} onClick={()=>setPeriod(v)}
                style={{padding:'7px 14px',borderRadius:7,border:`1.5px solid ${period===v?C.accent:C.border}`,
                  background:period===v?`${C.accent}22`:'transparent',
                  color:period===v?C.accent:C.textSec,cursor:'pointer',fontSize:12,fontWeight:period===v?600:400}}>
                {l}
              </button>
            ))}
          </div>
          <Btn variant="secondary" icon="upload" size="sm" onClick={()=>exportAnalyticsCSV(filtered)}>CSV 내보내기</Btn>
        </div>
      </div>

      {/* KPI 카드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
        {kpiCards.map(k=>(
          <div key={k.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <div style={{width:34,height:34,borderRadius:8,background:`${k.color}22`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={k.icon} size={16} color={k.color}/>
              </div>
              <span style={{fontSize:12,color:C.textSec,flex:1}}>{k.label}</span>
              {k.trend && <span style={{fontSize:18,color:k.trend==='up'?C.success:'#FF6363'}}>{k.trend==='up'?'↑':'↓'}</span>}
            </div>
            <div style={{fontSize:28,fontWeight:800,color:k.color,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:11,color:C.textSec,marginTop:6}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* 차트 2열 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px'}}>
          <h3 style={{margin:'0 0 16px',fontSize:14,fontWeight:700,color:C.text}}>캠페인별 오픈율 (%)</h3>
          {barData.length>0
            ? <BarChart data={barData} color={C.accent} height={180} valueFormat={v=>`${v}%`}/>
            : <div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',color:C.textSec,fontSize:13}}>발송된 캠페인이 없습니다</div>}
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px'}}>
          <h3 style={{margin:'0 0 16px',fontSize:14,fontWeight:700,color:C.text}}>핵심 지표</h3>
          <div style={{display:'flex',justifyContent:'space-around',alignItems:'center',height:160}}>
            <DonutChart value={stats.avgOpenRate} max={100} color={C.accent} size={110} label="오픈율" sublabel="avg"/>
            <DonutChart value={stats.avgClickRate} max={30} color={C.success} size={110} label="클릭율" sublabel="avg"/>
            <DonutChart value={stats.avgCTOR} max={50} color={C.warning} size={110} label="CTOR" sublabel="avg"/>
          </div>
        </div>
      </div>

      {/* 월별 트렌드 */}
      {monthlyData.length>=2 && (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px',marginBottom:20}}>
          <h3 style={{margin:'0 0 16px',fontSize:14,fontWeight:700,color:C.text}}>월별 오픈율 트렌드</h3>
          <LineChart data={monthlyData} color={C.accent} fillColor={C.accent} height={150} valueFormat={v=>`${v}%`}/>
        </div>
      )}

      {/* 시간대 히트맵 */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>발송 시간대 히트맵</h3>
          <span style={{fontSize:12,color:C.textSec}}>색이 진할수록 오픈 수 높음</span>
        </div>
        {sentCampaigns.length>0
          ? <HeatMap data={heatmapData}/>
          : <div style={{textAlign:'center',padding:'32px',color:C.textSec,fontSize:13}}>발송 데이터가 없습니다</div>}
      </div>

      {/* 캠페인 성과 테이블 */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>캠페인별 상세 성과</h3>
          <span style={{fontSize:12,color:C.textSec}}>{sorted.length}개 캠페인</span>
        </div>
        {sorted.length===0 ? (
          <div style={{textAlign:'center',padding:'40px',color:C.textSec,fontSize:13}}>발송된 캠페인이 없습니다</div>
        ) : (<>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',
            padding:'10px 20px',background:C.surface2,
            fontSize:11,fontWeight:600,color:C.textSec,textTransform:'uppercase',letterSpacing:'0.5px'}}>
            {[['name','캠페인명'],['sentAt','발송일'],['recipients','수신자'],
              ['openRate','오픈율'],['clickRate','클릭율'],['ctor','CTOR']].map(([k,l])=>(
              <div key={k} style={{cursor:'pointer',userSelect:'none'}} onClick={()=>toggleSort(k)}>
                {l}<SortIcon k={k}/>
              </div>
            ))}
          </div>
          {sorted.map((camp,i)=>{
            const openRate=camp.recipients>0?Math.round((camp.openCount||0)/camp.recipients*100):0;
            const clickRate=camp.recipients>0?Math.round((camp.clickCount||0)/camp.recipients*100):0;
            const ctor=camp.openCount>0?Math.round((camp.clickCount||0)/(camp.openCount||1)*100):0;
            const goodOpen=openRate>=21.5, goodClick=clickRate>=2.6;
            return (
              <div key={camp.id}
                style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',
                  padding:'13px 20px',borderTop:`1px solid ${C.border}`,alignItems:'center',
                  cursor:'pointer',transition:'background 0.15s'}}
                onClick={()=>setShowDetail(showDetail===camp.id?null:camp.id)}
                onMouseEnter={e=>e.currentTarget.style.background=C.surface2}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:C.text}}>{camp.name}</div>
                  <div style={{fontSize:11,color:C.textSec,marginTop:2}}>클릭하면 상세 보기</div>
                </div>
                <div style={{fontSize:13,color:C.textSec}}>{camp.sentAt||'-'}</div>
                <div style={{fontSize:13,color:C.text}}>{(camp.recipients||0).toLocaleString()}</div>
                <div>
                  <span style={{fontSize:13,fontWeight:600,color:goodOpen?C.success:'#FF6363'}}>{openRate}%</span>
                  <div style={{width:'100%',height:4,background:C.border,borderRadius:2,marginTop:4}}>
                    <div style={{width:`${Math.min(openRate,100)}%`,height:'100%',borderRadius:2,background:goodOpen?C.success:'#FF6363'}}/>
                  </div>
                </div>
                <div>
                  <span style={{fontSize:13,fontWeight:600,color:goodClick?C.success:C.warning}}>{clickRate}%</span>
                  <div style={{width:'100%',height:4,background:C.border,borderRadius:2,marginTop:4}}>
                    <div style={{width:`${Math.min(clickRate*10,100)}%`,height:'100%',borderRadius:2,background:goodClick?C.success:C.warning}}/>
                  </div>
                </div>
                <div style={{fontSize:13,color:C.textSec,fontWeight:500}}>{ctor}%</div>
              </div>
            );
          })}
        </>)}
      </div>

      {/* 상세 패널 (인라인 펼침) */}
      {showDetail && (()=>{
        const camp=sorted.find(c=>c.id===showDetail);
        if (!camp) return null;
        const openRate=camp.recipients>0?Math.round((camp.openCount||0)/camp.recipients*100):0;
        const clickRate=camp.recipients>0?Math.round((camp.clickCount||0)/camp.recipients*100):0;
        const ctor=camp.openCount>0?Math.round((camp.clickCount||0)/(camp.openCount||1)*100):0;
        const noOpen=(camp.recipients||0)-(camp.openCount||0);
        return (
          <div style={{marginTop:12,background:C.surface,border:`1px solid ${C.accent}55`,borderRadius:12,padding:'20px 24px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <h3 style={{margin:0,fontSize:15,fontWeight:700,color:C.text}}>📊 {camp.name} 상세</h3>
              <button onClick={()=>setShowDetail(null)}
                style={{background:'transparent',border:'none',color:C.textSec,cursor:'pointer',fontSize:20,lineHeight:1}}>×</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:12}}>
              {[['발송',camp.recipients||0,'명',C.text],['오픈',camp.openCount||0,'명',C.accent],
                ['클릭',camp.clickCount||0,'명',C.success],['미오픈',noOpen,'명','#FF6363'],
                ['오픈율',openRate,'%',C.accent],['CTOR',ctor,'%',C.warning]].map(([k,v,unit,color])=>(
                <div key={k} style={{background:C.surface2,borderRadius:10,padding:'14px 16px',textAlign:'center'}}>
                  <div style={{fontSize:11,color:C.textSec,marginBottom:6}}>{k}</div>
                  <div style={{fontSize:22,fontWeight:800,color}}>{typeof v==='number'?v.toLocaleString():v}</div>
                  <div style={{fontSize:11,color:C.textSec}}>{unit}</div>
                </div>
              ))}
            </div>
            {noOpen>0 && (
              <div style={{marginTop:14,padding:'12px 16px',background:`${C.warning}11`,border:`1px solid ${C.warning}44`,
                borderRadius:8,fontSize:13,color:C.warning,display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18}}>💡</span>
                <span>
                  <strong>{noOpen.toLocaleString()}명</strong>이 아직 미오픈 상태입니다.
                  <strong style={{marginLeft:6}}>수신자 관리 → 태그 필터</strong>로 세그먼트하여 재발송을 고려해보세요.
                </span>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

/* =========================================================
   9. ROUTER
   ========================================================= */
function Router() {
  const {state} = useApp();
  const pages = {
    dashboard:  <DashboardPage/>,
    contacts:   <ContactsPage/>,
    campaigns:  <CampaignsPage/>,
    templates:  <TemplatesPage/>,
    automation: <AutomationPage/>,
    analytics:  <AnalyticsPage/>,
    settings:   <SettingsPage/>,
  };
  return pages[state.page] || pages.dashboard;
}

/* =========================================================
   10. APP ROOT
   ========================================================= */
function App() {
  return (
    <AppProvider>
      <style>{`
        @keyframes slideIn {
          from { opacity:0; transform:translateX(20px); }
          to   { opacity:1; transform:translateX(0); }
        }
        input[type=color]::-webkit-color-swatch-wrapper { padding:0; }
        input[type=color]::-webkit-color-swatch { border:none; border-radius:6px; }
        a:hover { opacity:0.8; }
      `}</style>
      <Layout>
        <Router/>
      </Layout>
      <OnboardingModal/>
    </AppProvider>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
